<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <!-- background -->
  <rect width="1280" height="400" fill="#F6F4EE"/>

  <!-- thin frame -->
  <rect x="20" y="20" width="1240" height="360" fill="none" stroke="#14181F" stroke-width="2"/>

  <!-- left: wordmark -->
  <g transform="translate(88, 150)">
    <text x="0" y="0" font-size="128" font-weight="900" letter-spacing="-5" fill="#14181F">AFFITTO<tspan fill="#C2342A">.</tspan></text>

    <!-- tricolore bar -->
    <g transform="translate(4, 34)">
      <rect x="0"   y="0" width="96" height="10" fill="#2E7D4F"/>
      <rect x="96"  y="0" width="96" height="10" fill="#FFFFFF" stroke="#DDD9CE" stroke-width="1"/>
      <rect x="192" y="0" width="96" height="10" fill="#C2342A"/>
    </g>

    <text x="4" y="86" font-size="21" font-weight="500" letter-spacing="4" fill="#6B7078">REGISTRO AFFITTI &#183; CASSA &#183; QUOTE &#183; SPESE</text>
  </g>

  <!-- right: stamp motif -->
  <g transform="translate(1000, 132) rotate(-8)">
    <rect x="0" y="0" width="196" height="86" rx="8" fill="#E7F2EB" stroke="#1E7A46" stroke-width="4"/>
    <text x="98" y="46" text-anchor="middle" font-size="34" font-weight="900" letter-spacing="3" fill="#1E7A46">&#10003; PAGATO</text>
    <text x="98" y="70" text-anchor="middle" font-size="15" font-weight="700" letter-spacing="1" fill="#1E7A46">05 / 07 / 2026</text>
  </g>

  <!-- small offline tag -->
  <g transform="translate(88, 316)">
    <rect x="0" y="0" width="330" height="30" rx="6" fill="#14181F"/>
    <text x="16" y="20" font-size="13" font-weight="800" letter-spacing="2" fill="#FFFFFF">100% OFFLINE &#183; SINGLE FILE &#183; NO TRACKING</text>
  </g>
</svg>
