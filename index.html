<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFFITTO — Registro affitti</title>
<style>
  :root{
    --carta:#F6F4EE;
    --bianco:#FFFFFF;
    --inchiostro:#14181F;
    --grigio:#6B7078;
    --linea:#DDD9CE;
    --linea-forte:#14181F;
    --verde:#1E7A46;
    --verde-chiaro:#E7F2EB;
    --rosso:#C2342A;
    --rosso-chiaro:#F9ECEA;
    --giallo-chiaro:#FBF3DC;
    --radius:10px;
    --font:"Helvetica Neue",Helvetica,Arial,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--carta);
    color:var(--inchiostro);
    font-family:var(--font);
    font-size:15px;
    line-height:1.45;
    padding-bottom:80px;
  }
  button{font-family:var(--font);cursor:pointer}
  input,select{font-family:var(--font)}
  :focus-visible{outline:3px solid var(--inchiostro);outline-offset:2px}
  [hidden]{display:none!important}
  .modal-back{
    position:fixed;inset:0;background:rgba(20,24,31,.5);z-index:50;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .modal{
    background:#fff;border:2px solid var(--inchiostro);border-radius:12px;
    max-width:440px;width:100%;padding:22px;
    box-shadow:0 12px 40px rgba(20,24,31,.25);
  }
  .modal-msg{font-size:15px;line-height:1.5;margin-bottom:18px}
  .modal-btns{display:flex;gap:10px;justify-content:flex-end}
  .btn.danger-solid{background:var(--rosso);border-color:var(--rosso);color:#fff}
  .btn.danger-solid:hover{background:#A62A22}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation:none!important;transition:none!important}
  }

  /* ---------- Header ---------- */
  header{
    max-width:960px;margin:0 auto;padding:28px 20px 0;
  }
  .logo{
    font-size:clamp(44px,9vw,76px);
    font-weight:900;
    letter-spacing:-0.04em;
    line-height:.95;
    text-transform:uppercase;
  }
  .logo .dot{color:var(--rosso)}
  .tricolore{
    display:flex;height:6px;width:120px;margin:14px 0 6px;
  }
  .tricolore span{flex:1}
  .tricolore span:nth-child(1){background:#2E7D4F}
  .tricolore span:nth-child(2){background:#fff;border-top:1px solid var(--linea);border-bottom:1px solid var(--linea)}
  .tricolore span:nth-child(3){background:var(--rosso)}
  .tagline{
    font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--grigio);
  }

  /* ---------- Tabs ---------- */
  nav.tabs{
    max-width:960px;margin:22px auto 0;padding:0 20px;
    display:flex;gap:0;border-bottom:2px solid var(--inchiostro);
  }
  nav.tabs button{
    background:none;border:none;
    font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    padding:12px 18px;color:var(--grigio);
    border-bottom:4px solid transparent;margin-bottom:-2px;
  }
  nav.tabs button.active{color:var(--inchiostro);border-bottom-color:var(--rosso)}
  nav.tabs button:hover{color:var(--inchiostro)}

  main{max-width:960px;margin:0 auto;padding:24px 20px 0}

  /* ---------- Generic ---------- */
  .card{
    background:var(--bianco);border:1px solid var(--linea);border-radius:var(--radius);
    padding:20px;margin-bottom:20px;
  }
  h2.sec{
    font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;
    color:var(--grigio);margin-bottom:14px;
  }
  .muted{color:var(--grigio)}
  .small{font-size:12.5px}
  .amount{font-variant-numeric:tabular-nums;font-weight:700}
  .btn{
    border:2px solid var(--inchiostro);background:var(--inchiostro);color:#fff;
    border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;
    letter-spacing:.04em;
  }
  .btn:hover{background:#000}
  .btn.ghost{background:transparent;color:var(--inchiostro)}
  .btn.ghost:hover{background:var(--inchiostro);color:#fff}
  .btn.danger{border-color:var(--rosso);background:transparent;color:var(--rosso)}
  .btn.danger:hover{background:var(--rosso);color:#fff}
  .btn.sm{padding:5px 10px;font-size:12px}
  input[type=text],input[type=number]{
    border:1.5px solid var(--linea);border-radius:8px;padding:9px 12px;
    font-size:15px;background:#fff;width:100%;
  }
  input:focus{border-color:var(--inchiostro)}

  /* ---------- Month nav ---------- */
  .monthnav{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:20px;gap:10px;
  }
  .monthnav .mtitle{
    font-size:clamp(22px,4.5vw,30px);font-weight:900;letter-spacing:-0.02em;
    text-transform:capitalize;text-align:center;flex:1;
  }
  .monthnav button{
    border:2px solid var(--inchiostro);background:#fff;border-radius:50%;
    width:42px;height:42px;font-size:18px;font-weight:900;line-height:1;
  }
  .monthnav button:hover{background:var(--inchiostro);color:#fff}

  /* ---------- Summary strip ---------- */
  .strip{
    display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;
  }
  .strip .box{
    background:var(--bianco);border:1px solid var(--linea);border-radius:var(--radius);
    padding:14px 16px;
  }
  .strip .lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--grigio);margin-bottom:4px}
  .strip .val{font-size:clamp(18px,3.4vw,24px);font-weight:900;font-variant-numeric:tabular-nums}
  .strip .val.green{color:var(--verde)}
  .strip .val.red{color:var(--rosso)}

  .progress{
    height:10px;background:#ECE9E0;border-radius:99px;overflow:hidden;margin-bottom:24px;
    border:1px solid var(--linea);
  }
  .progress .fill{height:100%;background:var(--verde);transition:width .35s ease}
  .progress .fill.done{background:var(--verde)}

  /* ---------- Entry rows (registro) ---------- */
  .voce{
    display:flex;align-items:center;gap:14px;
    padding:14px 4px;border-bottom:1px dashed var(--linea);
  }
  .voce:last-child{border-bottom:none}
  .voce .info{flex:1;min-width:0}
  .voce .nome{font-weight:700;font-size:16px}
  .voce .chi{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
  .voce .euro{font-size:17px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
  .avatar{
    width:24px;height:24px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:10.5px;font-weight:800;color:#fff;letter-spacing:.02em;
    text-transform:uppercase;
  }
  .avatar.off{background:#E3E0D6!important;color:var(--grigio)}
  .no-people{font-size:12px;color:var(--rosso);font-weight:700;margin-top:5px}
  .scadenza{font-size:11.5px;color:var(--grigio);margin-top:3px;font-weight:600;letter-spacing:.02em}
  .scadenza .late{color:var(--rosso);font-weight:800}
  .scadenza .ahead{color:var(--verde);font-weight:800}
  .stampcol{display:flex;flex-direction:column;align-items:flex-end;gap:5px;min-width:96px}
  .stampcol .stampbtn{min-width:0}
  .morebtn{
    border:none;background:none;font-size:11px;font-weight:700;color:var(--grigio);
    text-decoration:underline;text-underline-offset:2px;padding:2px 4px;letter-spacing:.02em;
  }
  .morebtn:hover{color:var(--inchiostro)}
  .futuri{
    background:var(--carta);border:1px dashed var(--linea);border-radius:var(--radius);
    padding:14px 16px;margin:2px 0 12px;
  }
  .futuri .ftitle{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--grigio);margin-bottom:10px}
  .futuri .fpills{display:flex;gap:8px;flex-wrap:wrap}
  .fpill{
    border:1.5px solid var(--linea);background:#fff;border-radius:99px;
    padding:7px 14px;font-size:13px;font-weight:700;color:var(--grigio);
  }
  .fpill:hover{border-color:var(--inchiostro);color:var(--inchiostro)}
  .fpill.on{border-color:var(--verde);color:var(--verde);background:var(--verde-chiaro)}
  .futuri .fhint{font-size:12px;color:var(--grigio);margin-top:10px}
  select{border:1.5px solid var(--linea);border-radius:8px;padding:8px 10px;font-size:13.5px;background:#fff;font-family:var(--font)}
  select:focus{border-color:var(--inchiostro)}
  .optl{display:flex;flex-direction:column;gap:4px;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--grigio);font-weight:800}
  .optl input{font-size:13.5px;padding:8px 10px}
  .gvoce .opts{grid-column:1/-1;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-top:4px}

  /* ---------- Cassa ---------- */
  .strip.four{grid-template-columns:repeat(4,1fr)}
  .strip.two{grid-template-columns:1fr 1fr}
  .tagcash{
    font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
    background:var(--verde);color:#fff;border-radius:4px;padding:2px 6px;
    vertical-align:2px;margin-left:4px;
  }
  .cashtag{color:var(--verde);font-weight:700}
  .monthactions{
    border:1px dashed var(--inchiostro);background:#EFECE3;border-radius:var(--radius);
    padding:13px 16px;margin-bottom:20px;
  }
  .monthactions .ma-note{font-size:13px;margin-bottom:10px}
  .monthactions .ma-btns{display:flex;gap:8px;flex-wrap:wrap}
  .monthactions .ma-btns:empty{display:none}
  .monthactions.excluded{border-color:var(--grigio);background:#ECEAE4;color:var(--grigio)}
  .splitbtn{border-style:dashed}
  .splitbtn.on{border-style:solid;border-color:var(--verde);color:var(--verde);background:var(--verde-chiaro)}
  .splitpanel{margin-top:-6px}
  .splitrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px dashed var(--linea)}
  .splitrow:last-of-type{border-bottom:none}
  .splitrow .sname{flex:1;font-weight:700;font-size:14px}
  .splitrow .sval{font-variant-numeric:tabular-nums}
  .splitrow .sinput{display:flex;align-items:center;gap:5px}
  .arrlist li{margin-bottom:8px;line-height:1.4}
  .arrlist li:last-child{margin-bottom:0}
  .tagcarry{
    font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
    background:var(--rosso);color:#fff;border-radius:4px;padding:2px 6px;
    vertical-align:1px;margin-left:2px;
  }
  .warnbox{
    border:1px solid #8A6D1A;background:var(--giallo-chiaro);
    border-radius:var(--radius);padding:16px 18px;margin-bottom:20px;
  }
  .warnbox h3{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#8A6D1A;margin-bottom:8px}
  .warnbox li{margin-left:18px;font-size:14px;padding:2px 0}
  .notetxt{font-style:italic}
  .xav{background:var(--inchiostro)!important;border-radius:6px!important}
  .tagspesa{
    font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
    background:var(--inchiostro);color:#fff;border-radius:4px;padding:2px 6px;
    vertical-align:2px;margin-left:4px;
  }
  .src-est{color:var(--grigio);font-weight:700}
  .srcrow{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .initrow{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
  .strip .box.saldo{border:2px solid var(--inchiostro)}
  .strip .box.saldo.neg{border-color:var(--rosso);background:var(--rosso-chiaro)}
  .wform{display:grid;grid-template-columns:1fr 110px 140px 150px;gap:12px;align-items:end}
  .wform .wnote{grid-column:1/4}
  .wform #w-add{align-self:end}
  input[type=date]{border:1.5px solid var(--linea);border-radius:8px;padding:8px 10px;font-size:13.5px;background:#fff;font-family:var(--font);width:100%}
  input[type=date]:focus{border-color:var(--inchiostro)}
  .mov{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px dashed var(--linea)}
  .mov:last-child{border-bottom:none}
  .mov .minfo{flex:1;min-width:0}
  .mov .mname{font-weight:700;font-size:14.5px}
  .mov .mmeta{font-size:12px;color:var(--grigio)}
  .mov .euro{font-size:15px}
  .yearpick{display:flex;align-items:center;gap:12px;justify-content:flex-end;margin-top:12px}
  @media (max-width:640px){
    .wform{grid-template-columns:1fr 1fr}
    .wform .wnote{grid-column:1/-1}
    .wform #w-add{grid-column:1/-1}
  }

  /* the PAGATO stamp — signature element */
  .stampbtn{
    border:none;background:none;padding:0;min-width:96px;display:flex;justify-content:flex-end;
  }
  .stamp{
    display:inline-block;
    border:2.5px solid var(--verde);color:var(--verde);
    border-radius:6px;padding:3px 10px 2px;
    font-size:11.5px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;
    transform:rotate(-6deg);
    background:var(--verde-chiaro);
    box-shadow:0 0 0 1px rgba(30,122,70,.08);
  }
  .stamp small{display:block;font-size:8.5px;font-weight:700;letter-spacing:.06em;text-align:center;opacity:.8}
  .tostamp{
    border:2px dashed var(--grigio);color:var(--grigio);border-radius:6px;
    padding:6px 10px;font-size:11px;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;background:#fff;
  }
  .tostamp:hover{border-color:var(--verde);color:var(--verde);border-style:solid}
  @keyframes thump{0%{transform:rotate(-6deg) scale(1.8);opacity:0}60%{transform:rotate(-6deg) scale(.92);opacity:1}100%{transform:rotate(-6deg) scale(1)}}
  .stamp.new{animation:thump .28s ease-out}

  /* ---------- Persone quote ---------- */
  .persone-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
  .pcard{
    border:1px solid var(--linea);border-radius:var(--radius);padding:14px 16px;background:#fff;
  }
  .pcard .ptop{display:flex;align-items:center;gap:9px;margin-bottom:10px}
  .pcard .pname{font-weight:800;font-size:15px}
  .pcard .prow{display:flex;justify-content:space-between;font-size:13.5px;padding:3px 0}
  .pcard .prow .amount{font-size:13.5px}
  .pcard .stato{
    margin-top:10px;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    padding:4px 8px;border-radius:5px;display:inline-block;
  }
  .stato.ok{background:var(--verde-chiaro);color:var(--verde)}
  .stato.parziale{background:var(--giallo-chiaro);color:#8A6D1A}
  .stato.no{background:var(--rosso-chiaro);color:var(--rosso)}

  /* ---------- Alert / chi manca ---------- */
  .alertbox{
    border:1px solid var(--rosso);background:var(--rosso-chiaro);
    border-radius:var(--radius);padding:16px 18px;margin-bottom:20px;
  }
  .alertbox h3{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--rosso);margin-bottom:8px}
  .alertbox li{margin-left:18px;font-size:14px;padding:2px 0}
  .allok{
    border:1px solid var(--verde);background:var(--verde-chiaro);
    border-radius:var(--radius);padding:16px 18px;margin-bottom:20px;
    font-weight:800;color:var(--verde);letter-spacing:.04em;
  }

  /* ---------- Charts ---------- */
  .chartwrap{overflow-x:auto}
  .legend{display:flex;gap:18px;margin-top:10px;font-size:12.5px;color:var(--grigio)}
  .legend .k{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:6px;vertical-align:-1px}
  table.tbl{width:100%;border-collapse:collapse;font-size:14px}
  table.tbl th{
    text-align:left;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--grigio);padding:8px 10px;border-bottom:2px solid var(--inchiostro);
  }
  table.tbl td{padding:9px 10px;border-bottom:1px dashed var(--linea);font-variant-numeric:tabular-nums}
  table.tbl td.r,table.tbl th.r{text-align:right}

  /* ---------- Gestione ---------- */
  .gvoce{
    display:grid;grid-template-columns:1fr 130px auto;gap:10px;align-items:start;
    padding:14px 0;border-bottom:1px dashed var(--linea);
  }
  .gvoce:last-child{border-bottom:none}
  .gvoce .chips{grid-column:1/-1;display:flex;gap:7px;flex-wrap:wrap;margin-top:2px}
  .chip{
    border:1.5px solid var(--linea);background:#fff;border-radius:99px;
    padding:5px 12px;font-size:12.5px;font-weight:700;color:var(--grigio);
    display:inline-flex;align-items:center;gap:6px;
  }
  .chip.on{border-color:var(--inchiostro);color:var(--inchiostro);background:var(--carta)}
  .chip .dotc{width:9px;height:9px;border-radius:50%;background:#D5D2C8}
  .addrow{display:grid;grid-template-columns:1fr 130px auto;gap:10px;margin-top:16px}
  .addrow-p{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:16px}
  .plist-item{
    display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px dashed var(--linea);
  }
  .plist-item:last-child{border-bottom:none}
  .plist-item .pn{flex:1;font-weight:700}
  .hint{font-size:12.5px;color:var(--grigio);margin-top:10px}
  .backup-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  /* ---------- Empty state ---------- */
  .empty{
    text-align:center;padding:48px 20px;
  }
  .empty .big{font-size:22px;font-weight:900;margin-bottom:8px}
  .empty p{color:var(--grigio);max-width:420px;margin:0 auto 20px}

  @media (max-width:640px){
    nav.tabs button{padding:12px 9px;font-size:12px}
    .strip{grid-template-columns:1fr 1fr}
    .strip .box:first-child{grid-column:1/-1}
    .strip.four{grid-template-columns:1fr 1fr}
    .strip.four .box:first-child{grid-column:auto}
    .strip.four .box.saldo{grid-column:1/-1}
    .gvoce{grid-template-columns:1fr 110px auto}
    .addrow{grid-template-columns:1fr 100px auto}
    .voce{gap:10px}
    .stampbtn{min-width:78px}
  }
</style>
</head>
<body>

<header>
  <div class="logo">Affitto<span class="dot">.</span></div>
  <div class="tricolore"><span></span><span></span><span></span></div>
  <div class="tagline">Registro mensile · quote · pagamenti</div>
</header>

<nav class="tabs" id="tabs">
  <button data-tab="panoramica">Panoramica</button>
  <button data-tab="registro">Registro</button>
  <button data-tab="spese">Spese</button>
  <button data-tab="cassa">Cassa</button>
  <button data-tab="grafici">Grafici</button>
  <button data-tab="gestione">Gestione</button>
</nav>

<main id="app"></main>

<div id="modal" class="modal-back" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-msg">
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-btns">
      <button class="btn ghost" id="modal-cancel">Annulla</button>
      <button class="btn danger-solid" id="modal-ok">Conferma</button>
    </div>
  </div>
</div>

<script>
"use strict";

/* =============== State =============== */
const LS_KEY = "affitto_v1";
const MESI = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const MESI_SHORT = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
const FREQ_LABELS = {1:"Ogni mese",2:"Ogni 2 mesi",3:"Ogni 3 mesi",4:"Ogni 4 mesi",6:"Ogni 6 mesi",12:"Una volta l'anno"};
const PALETTE = ["#C2342A","#1E7A46","#2A5DA8","#8A6D1A","#7B3FA0","#B25B22","#0E7C7B","#5B5F97"];

const now = new Date();
let view = { tab:"panoramica", y: now.getFullYear(), m: now.getMonth(), chartY: now.getFullYear(), cassaY: now.getFullYear(), expandedEntry: null, expandedExpense: null, expandedSplit: null, expandedEdit: null };

/* =============== Migrazione / normalizzazione dello stato ===============
   Unico punto di verità sulla forma dei dati: usata al caricamento locale,
   all'import JSON e quando arriva uno stato remoto (es. Firebase). */
const SCHEMA_VERSION = 4;
function migrate(s){
  if(!s || typeof s!=="object") s = {};
  if(!Array.isArray(s.people)) s.people = [];
  if(!Array.isArray(s.entries)) s.entries = [];
  if(!s.payments || typeof s.payments!=="object") s.payments = {};
  if(!Array.isArray(s.withdrawals)) s.withdrawals = [];
  if(!Array.isArray(s.expenses)) s.expenses = [];
  if(!s.expensePayments || typeof s.expensePayments!=="object") s.expensePayments = {};
  if(typeof s.initialBalance!=="number" || isNaN(s.initialBalance)) s.initialBalance = 0;
  if(typeof s.initialCashBalance!=="number" || isNaN(s.initialCashBalance)) s.initialCashBalance = 0;
  if(!s.monthSetups || typeof s.monthSetups!=="object") s.monthSetups = {};
  if(!s.excludedMonths || typeof s.excludedMonths!=="object") s.excludedMonths = {};
  const fixItem = it => {
    if(!Array.isArray(it.peopleIds)) it.peopleIds = [];
    if(it.split && (it.split.mode!=="percent" && it.split.mode!=="fixed")) delete it.split;
    if(it.split && (!it.split.values || typeof it.split.values!=="object")) it.split.values = {};
  };
  s.entries.forEach(fixItem);
  s.expenses.forEach(fixItem);
  Object.values(s.monthSetups).forEach(setup=>{
    if(!Array.isArray(setup.entries)) setup.entries = [];
    if(!Array.isArray(setup.expenses)) setup.expenses = [];
    setup.entries.forEach(fixItem);
    setup.expenses.forEach(fixItem);
  });
  s.schemaVersion = SCHEMA_VERSION;
  return s;
}

let state = migrate(load());

/* =============== Dialoghi custom (confirm/alert nativi possono essere bloccati) =============== */
function askConfirm(msg, okLabel){
  return new Promise(res=>{
    const back = document.getElementById("modal");
    const ok = document.getElementById("modal-ok");
    const ca = document.getElementById("modal-cancel");
    document.getElementById("modal-msg").textContent = msg;
    ok.textContent = okLabel || "Conferma";
    ca.hidden = false;
    back.hidden = false;
    ok.focus();
    const done = v => { back.hidden = true; ok.onclick = ca.onclick = back.onclick = null; document.onkeydown = null; res(v); };
    ok.onclick = ()=>done(true);
    ca.onclick = ()=>done(false);
    back.onclick = e => { if(e.target===back) done(false); };
    document.onkeydown = e => { if(e.key==="Escape") done(false); };
  });
}
function notify(msg){
  return new Promise(res=>{
    const back = document.getElementById("modal");
    const ok = document.getElementById("modal-ok");
    const ca = document.getElementById("modal-cancel");
    document.getElementById("modal-msg").textContent = msg;
    ok.textContent = "OK";
    ca.hidden = true;
    back.hidden = false;
    ok.focus();
    const done = ()=>{ back.hidden = true; ok.onclick = back.onclick = null; document.onkeydown = null; ca.hidden = false; res(true); };
    ok.onclick = done;
    back.onclick = e => { if(e.target===back) done(); };
    document.onkeydown = e => { if(e.key==="Escape"||e.key==="Enter") done(); };
  });
}
let justStamped = null; // entry id for stamp animation

function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function persistLocal(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){ /* storage unavailable */ }
}
/* Ogni mutazione dello stato passa da qui: aggiorna il timestamp, salva in
   locale e notifica gli eventuali listener remoti (es. push su Firebase). */
const syncListeners = [];
function save(){
  state.updatedAt = new Date().toISOString();
  persistLocal();
  syncListeners.forEach(fn=>{ try{ fn(JSON.parse(JSON.stringify(state))); }catch(e){ console.error("sync listener error", e); } });
}

/* =============== API di integrazione (Firebase-ready) ===============
   L'app non conosce Firebase: espone solo questi ganci. Esempio di wiring
   in una pagina che carica anche il Firebase SDK:

     // push locale -> remoto (chiamato a ogni modifica)
     AFFITTO.onChange(s => setDoc(doc(db, "case", casaId), s));

     // remoto -> locale (chiamato quando arriva uno snapshot)
     onSnapshot(doc(db, "case", casaId), snap => {
       const remote = snap.data();
       if(remote && remote.updatedAt !== AFFITTO.getState().updatedAt){
         AFFITTO.applyRemote(remote);   // last-write-wins su updatedAt
       }
     });
*/
window.AFFITTO = {
  getState(){ return JSON.parse(JSON.stringify(state)); },
  applyRemote(remote){
    state = migrate(remote);
    persistLocal();           /* non rinotifica i listener: evita loop di echo */
    autoFreezePastMonths();
    render();
  },
  onChange(fn){ if(typeof fn==="function") syncListeners.push(fn); }
};
function uid(){ return Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4); }
function mk(y,m){ return y + "-" + String(m+1).padStart(2,"0"); }
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function eur(n){
  return new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR"}).format(n||0);
}
function personById(id){ return state.people.find(p=>p.id===id); }
function initials(name){
  const parts = name.trim().split(/\s+/);
  return (parts[0][0] + (parts[1]?parts[1][0]:"")).toUpperCase();
}

/* =============== Configurazione per mese (snapshot) ===============
   I mesi passati usano una copia congelata di voci e spese: le modifiche
   fatte in Gestione valgono solo per il mese corrente e i futuri. */
function curMonthIdx(){ const d=new Date(); return d.getFullYear()*12 + d.getMonth(); }
function idxOf(y,m){ return y*12 + m; }
function isPastMonthYM(y,m){ return idxOf(y,m) < curMonthIdx(); }
function isFrozen(y,m){ return !!state.monthSetups[mk(y,m)]; }
/* Mese escluso: non conta in dovuto, quote, grafici e arretrati */
function isExcluded(y,m){ return !!state.excludedMonths[mk(y,m)]; }
function freezeMonth(y,m){
  state.monthSetups[mk(y,m)] = {
    entries: JSON.parse(JSON.stringify(state.entries)),
    expenses: JSON.parse(JSON.stringify(state.expenses)),
    frozenAt: new Date().toISOString().slice(0,10)
  };
}
function monthConfig(y,m){
  const s = state.monthSetups[mk(y,m)];
  return s ? s : { entries: state.entries, expenses: state.expenses };
}
/* Congela automaticamente ogni mese passato che ha attività ma nessuno snapshot */
function autoFreezePastMonths(){
  let changed = false;
  const keys = new Set(Object.keys(state.payments).concat(Object.keys(state.expensePayments)));
  keys.forEach(k=>{
    const p = k.split("-");
    const ky = parseInt(p[0],10), km = parseInt(p[1],10)-1;
    if(isNaN(ky)||isNaN(km)) return;
    if(idxOf(ky,km) < curMonthIdx() && !state.monthSetups[k]){
      freezeMonth(ky,km); changed = true;
    }
  });
  if(changed) save();
}
/* Se si registra attività in un mese passato non congelato, congelalo prima
   (con la configurazione attuale: è la "replica" del setup corrente) */
function ensureFrozenIfPast(y,m){
  if(isPastMonthYM(y,m) && !isFrozen(y,m)){ freezeMonth(y,m); }
}

/* =============== Calculations =============== */
function monthPayments(y,m){ return state.payments[mk(y,m)] || {}; }
function isPaid(y,m,entryId){ return !!monthPayments(y,m)[entryId]; }
function paidAmount(y,m,entry){
  const rec = monthPayments(y,m)[entry.id];
  if(!rec) return 0;
  return (typeof rec.amount === "number") ? rec.amount : entry.amount;
}
function freqOf(e){ return (e.freq && e.freq>0) ? e.freq : 1; }
function cashOf(e){ return Math.max(0, Math.min(e.cashAmount||0, e.amount||0)); }
/* An entry is due in month m if (m - anchorMonth) is a multiple of its frequency.
   Frequencies are divisors of 12, so a month-of-year anchor is stable across years. */
function isDue(e,y,m){
  const f = freqOf(e);
  if(f===1) return true;
  const a = (typeof e.anchorMonth==="number") ? e.anchorMonth : 0;
  return (((m - a) % f) + f) % f === 0;
}
function dueEntries(y,m){ return isExcluded(y,m) ? [] : monthConfig(y,m).entries.filter(e=>isDue(e,y,m)); }
function monthTotals(y,m){
  let due=0, paid=0, nPaid=0, nTot=0;
  if(isExcluded(y,m)) return { due, paid, nPaid, nTot };
  monthConfig(y,m).entries.forEach(e=>{
    if(!isDue(e,y,m)) return;
    nTot++;
    due += e.amount;
    if(isPaid(y,m,e.id)){ paid += paidAmount(y,m,e); nPaid++; }
  });
  return { due, paid, nPaid, nTot };
}
/* Share of one entry for one person: parti uguali di default,
   oppure percentuale del totale / importo fisso se impostata una ripartizione */
function shareOf(entry, personId){
  if(!entry.peopleIds || !entry.peopleIds.length) return 0;
  if(!entry.peopleIds.includes(personId)) return 0;
  const sp = entry.split;
  if(sp && sp.mode==="percent") return (entry.amount||0) * ((sp.values&&sp.values[personId])||0) / 100;
  if(sp && sp.mode==="fixed") return (sp.values&&sp.values[personId])||0;
  return entry.amount / entry.peopleIds.length;
}
/* Verifica di coerenza della ripartizione: somma attesa vs somma impostata */
function splitCheck(entry){
  const sp = entry.split;
  if(!sp || !entry.peopleIds || !entry.peopleIds.length) return {ok:true};
  let sum = 0;
  entry.peopleIds.forEach(pid=>{ sum += (sp.values&&sp.values[pid])||0; });
  if(sp.mode==="percent") return { ok: Math.abs(sum-100)<0.01, sum, target:100, unit:"%" };
  return { ok: Math.abs(sum-(entry.amount||0))<0.01, sum, target:entry.amount||0, unit:"€" };
}
function personMonth(y,m,personId){
  let due=0, paid=0;
  if(isExcluded(y,m)) return { due, paid };
  monthConfig(y,m).entries.forEach(e=>{
    if(!isDue(e,y,m)) return;
    const s = shareOf(e, personId);
    if(s>0){
      due += s;
      if(isPaid(y,m,e.id)) paid += s;
    }
  });
  return { due, paid };
}
function stampPaid(y,m,entry,atDate){
  const key = mk(y,m);
  if(!state.payments[key]) state.payments[key] = {};
  state.payments[key][entry.id] = {
    amount: entry.amount || 0,
    cash: cashOf(entry),
    at: atDate || new Date().toISOString().slice(0,10)
  };
}
function togglePaid(y,m,entryId,animate){
  if(animate===undefined) animate = true;
  const key = mk(y,m);
  if(state.payments[key] && state.payments[key][entryId]){
    delete state.payments[key][entryId];
    if(!Object.keys(state.payments[key]).length) delete state.payments[key];
    justStamped = null;
  }else{
    ensureFrozenIfPast(y,m);
    const e = monthConfig(y,m).entries.find(x=>x.id===entryId);
    if(!e){ return; }
    stampPaid(y,m,e);
    justStamped = animate ? entryId : null;
  }
  save(); render();
}
/* Next `count` months in which the entry is due, strictly after (y,m) */
function nextDueMonths(e, y, m, count){
  const out = [];
  let yy = y, mm = m, guard = 0;
  while(out.length < count && guard < 100){
    mm++; if(mm>11){ mm=0; yy++; }
    if(isDue(e,yy,mm)) out.push({y:yy, m:mm});
    guard++;
  }
  return out;
}
/* How many months after (y,m) already have this entry stamped as paid */
function futurePaidCount(e, y, m){
  const cur = y*12 + m;
  let c = 0;
  Object.keys(state.payments).forEach(k=>{
    const parts = k.split("-");
    const idx = parseInt(parts[0],10)*12 + (parseInt(parts[1],10)-1);
    if(idx > cur && state.payments[k][e.id]) c++;
  });
  return c;
}

/* =============== Spese comuni =============== */
function expPayments(y,m){ return state.expensePayments[mk(y,m)] || {}; }
function isExpPaid(y,m,id){ return !!expPayments(y,m)[id]; }
function expenseMonthTotals(y,m){
  let due=0, paid=0, nPaid=0, nTot=0;
  if(isExcluded(y,m)) return { due, paid, nPaid, nTot };
  monthConfig(y,m).expenses.forEach(x=>{
    if(!isDue(x,y,m)) return;
    nTot++;
    due += x.amount;
    const rec = expPayments(y,m)[x.id];
    if(rec){ paid += (typeof rec.amount==="number"?rec.amount:x.amount); nPaid++; }
  });
  return { due, paid, nPaid, nTot };
}
function personExpMonth(y,m,personId){
  let due=0, paid=0;
  if(isExcluded(y,m)) return { due, paid };
  monthConfig(y,m).expenses.forEach(x=>{
    if(!isDue(x,y,m)) return;
    const s = shareOf(x, personId);
    if(s>0){
      due += s;
      if(isExpPaid(y,m,x.id)) paid += s;
    }
  });
  return { due, paid };
}
function markExpPaid(y,m,id,source,date){
  const key = mk(y,m);
  ensureFrozenIfPast(y,m);
  const x = monthConfig(y,m).expenses.find(e=>e.id===id);
  if(!x) return;
  if(!state.expensePayments[key]) state.expensePayments[key] = {};
  const src = (source==="cassa"||source==="contanti") ? source : "esterno";
  state.expensePayments[key][id] = { amount:x.amount, at: date || new Date().toISOString().slice(0,10), source: src };
  view.expandedExpense = null;
  save(); render();
}
function unmarkExpPaid(y,m,id){
  const key = mk(y,m);
  if(state.expensePayments[key] && state.expensePayments[key][id]){
    delete state.expensePayments[key][id];
    if(!Object.keys(state.expensePayments[key]).length) delete state.expensePayments[key];
  }
  save(); render();
}
function expensesOutBy(src){
  let t=0;
  Object.values(state.expensePayments).forEach(mo=>{
    Object.values(mo).forEach(r=>{ if(r && r.source===src && typeof r.amount==="number") t+=r.amount; });
  });
  return t;
}
function totalExpensesFromCassa(){ return expensesOutBy("cassa") + expensesOutBy("contanti"); }

/* =============== Fondo cassa =============== */
function totalPaidAll(){
  let t=0;
  Object.values(state.payments).forEach(mo=>{
    Object.values(mo).forEach(r=>{ if(r && typeof r.amount==="number") t+=r.amount; });
  });
  return t;
}
function totalCashIn(){
  let t=0;
  Object.values(state.payments).forEach(mo=>{
    Object.values(mo).forEach(r=>{ if(r && typeof r.cash==="number") t+=r.cash; });
  });
  return t;
}
function withdrawnBy(fund){
  return state.withdrawals
    .filter(w=> (fund==="contanti") ? w.fund==="contanti" : w.fund!=="contanti")
    .reduce((t,w)=>t+(w.amount||0),0);
}
/* Saldi dei due fondi: conto (bonifici) e contanti */
function fundBalances(){
  const totIn = totalPaidAll();
  const cashIn = totalCashIn();
  const contoIn = totIn - cashIn;
  const wConto = withdrawnBy("conto"), wCash = withdrawnBy("contanti");
  const xConto = expensesOutBy("cassa"), xCash = expensesOutBy("contanti");
  return {
    totIn, cashIn, contoIn,
    outPrelievi: wConto + wCash,
    outSpese: xConto + xCash,
    conto: (state.initialBalance||0) + contoIn - wConto - xConto,
    contanti: (state.initialCashBalance||0) + cashIn - wCash - xCash
  };
}
function totalWithdrawn(){
  return state.withdrawals.reduce((t,w)=>t+(w.amount||0),0);
}
function personWithdrawn(personId, year){
  return state.withdrawals
    .filter(w=>w.personId===personId && (!year || (w.date||"").startsWith(String(year))))
    .reduce((t,w)=>t+(w.amount||0),0);
}
function fmtDate(iso){
  if(!iso) return "—";
  return iso.split("-").reverse().join("/");
}

/* ---------- Panoramica ---------- */
/* Mesi "tracciati": quelli con attività o snapshot, più il mese corrente.
   I mesi precedenti all'inizio dell'uso (senza dati) non generano arretrati. */
function trackedMonthsUpToNow(){
  const cur = curMonthIdx();
  const set = new Set([mk(now.getFullYear(), now.getMonth())]);
  Object.keys(state.payments).forEach(k=>set.add(k));
  Object.keys(state.expensePayments).forEach(k=>set.add(k));
  Object.keys(state.monthSetups).forEach(k=>set.add(k));
  return Array.from(set)
    .map(k=>{ const p=k.split("-"); return {y:parseInt(p[0],10), m:parseInt(p[1],10)-1, key:k}; })
    .filter(o=>!isNaN(o.y) && !isNaN(o.m) && idxOf(o.y,o.m)<=cur)
    .sort((a,b)=>idxOf(a.y,a.m)-idxOf(b.y,b.m));
}
/* Voci dovute e non pagate nei mesi tracciati, con giorni di ritardo a oggi */
function arrears(){
  const todayMid = new Date(); todayMid.setHours(0,0,0,0);
  const out = [];
  trackedMonthsUpToNow().forEach(o=>{
    if(isExcluded(o.y,o.m)) return;
    monthConfig(o.y,o.m).entries.forEach(e=>{
      if(!isDue(e,o.y,o.m) || isPaid(o.y,o.m,e.id)) return;
      const lastDay = new Date(o.y, o.m+1, 0).getDate();
      const day = Math.min(e.dueDay || lastDay, lastDay);
      const dueDate = new Date(o.y, o.m, day);
      const daysLate = Math.floor((todayMid - dueDate) / 86400000);
      out.push({ y:o.y, m:o.m, entry:e, dueDate, daysLate });
    });
  });
  out.sort((a,b)=> b.daysLate - a.daysLate);
  return out;
}
/* Contratti in scadenza (≤ 6 mesi) o scaduti, dalle voci attuali */
function expiringContracts(){
  const todayMid = new Date(); todayMid.setHours(0,0,0,0);
  const out = [];
  state.entries.forEach(e=>{
    if(!e.contractEnd) return;
    const parts = e.contractEnd.split("-");
    const end = new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
    const days = Math.round((end - todayMid) / 86400000);
    if(days <= 183) out.push({ entry:e, end, days });
  });
  out.sort((a,b)=>a.days-b.days);
  return out;
}
function renderOverview(){

  const due = dueEntries(y,m);
