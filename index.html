  const tx = expenseMonthTotals(y,m);
  const unpaidX = monthConfig(y,m).expenses.filter(x=>isDue(x,y,m) && !isExpPaid(y,m,x.id));

  let html = `
    <div class="strip">
      <div class="box saldo"><div class="lbl">Saldo cassa · conto</div><div class="val ${bal.conto<-0.005?'red':''}">${eur(bal.conto)}</div></div>
      <div class="box saldo"><div class="lbl">Saldo cassa · contanti</div><div class="val ${bal.contanti<-0.005?'red':''}">${eur(bal.contanti)}</div></div>
      <div class="box"><div class="lbl">Totale fondi</div><div class="val">${eur(bal.conto+bal.contanti)}</div></div>
    </div>`;

  /* arrears: unpaid entries across tracked months, most overdue first */
  const arr = arrears();
  if(arr.length){
    const totArr = arr.reduce((t,a)=>t+(a.entry.amount||0),0);
    html += `<div class="alertbox"><h3>Da pagare — ${arr.length} ${arr.length===1?"voce scoperta":"voci scoperte"} · ${eur(totArr)}</h3><ul class="arrlist">`;
    arr.forEach(a=>{
      const e = a.entry;
      const names = (e.peopleIds||[]).map(id=>{const p=personById(id);return p?esc(p.name):null}).filter(Boolean);
      const dueStr = `${String(a.dueDate.getDate()).padStart(2,"0")}/${String(a.dueDate.getMonth()+1).padStart(2,"0")}/${a.dueDate.getFullYear()}`;
      let ritardo;
      if(a.daysLate>0) ritardo = `<strong style="color:var(--rosso)">⏰ ${a.daysLate} ${a.daysLate===1?"giorno":"giorni"} di ritardo</strong>`;
      else if(a.daysLate===0) ritardo = `<strong>scade oggi</strong>`;
      else ritardo = `<span class="muted">scade tra ${-a.daysLate} ${a.daysLate===-1?"giorno":"giorni"}</span>`;
      const carry = idxOf(a.y,a.m) < curMonthIdx() ? ` <span class="tagcarry">arretrato</span>` : "";
      html += `<li><strong>${esc(e.name)}</strong> — ${eur(e.amount)} · ${MESI[a.m]} ${a.y}${carry}<br>
        <span class="small">${names.length?names.join(", "):"<em>non assegnata</em>"} · doveva pagare entro il ${dueStr} · ${ritardo}</span></li>`;
    });
    html += `</ul></div>`;
  }else if(state.entries.length){
    html += `<div class="allok">✓ Nessun pagamento scoperto: tutti in regola, anche sui mesi passati.</div>`;
  }

  /* contracts expiring within 6 months */
  const contracts = expiringContracts();
  if(contracts.length){
    html += `<div class="warnbox"><h3>Contratti in scadenza</h3><ul class="arrlist">`;
    contracts.forEach(c=>{
      const e = c.entry;
      const endStr = `${String(c.end.getDate()).padStart(2,"0")}/${String(c.end.getMonth()+1).padStart(2,"0")}/${c.end.getFullYear()}`;
      let quando;
      if(c.days < 0) quando = `<strong style="color:var(--rosso)">scaduto da ${-c.days} ${c.days===-1?"giorno":"giorni"}</strong>`;
      else if(c.days === 0) quando = `<strong style="color:var(--rosso)">scade oggi</strong>`;
      else quando = `<strong>scade tra ${c.days} ${c.days===1?"giorno":"giorni"}</strong> (~${Math.max(1,Math.round(c.days/30.4))} ${Math.round(c.days/30.4)<=1?"mese":"mesi"})`;
      html += `<li><strong>${esc(e.name)}</strong> — fine contratto il ${endStr} · ${quando}${e.note?`<br><span class="small muted">📝 ${esc(e.note)}</span>`:""}</li>`;
    });
    html += `</ul><p class="hint" style="margin-top:8px">Avviso mostrato per i contratti a 6 mesi o meno dalla fine (date impostate in Gestione).</p></div>`;
  }

  /* who paid / who owes this month */
  html += `<div class="card"><h2 class="sec">Questo mese — ${MESI[m]} ${y} · ${t.nPaid} di ${t.nTot} voci pagate</h2>`;
  if(!due.length){
    html += `<p class="muted">Nessuna voce in scadenza questo mese.</p>`;
  }else{
    html += `<table class="tbl"><thead><tr><th>Persona</th><th class="r">Quota mese</th><th class="r">Coperto</th><th class="r">Stato</th></tr></thead><tbody>`;
    state.people.forEach(p=>{
      const q = personMonth(y,m,p.id);
      if(q.due<=0.005) return;
      let stato, cls;
      if(q.paid>=q.due-0.005){ stato="In regola"; cls="ok"; }
      else if(q.paid>0.005){ stato="Parziale"; cls="parziale"; }
      else { stato="Da pagare"; cls="no"; }
      html += `<tr>
        <td><span class="avatar" style="background:${p.color};margin-right:8px">${esc(initials(p.name))}</span>${esc(p.name)}</td>
        <td class="r">${eur(q.due)}</td>
        <td class="r" style="color:var(--verde);font-weight:700">${eur(q.paid)}</td>
        <td class="r"><span class="stato ${cls}">${stato}</span></td></tr>`;
    });
    html += `</tbody></table>`;
    if(!unpaid.length){
      html += `<p class="hint" style="margin-top:12px;color:var(--verde);font-weight:700">✓ Tutte le voci del mese sono pagate.</p>`;
    }
    if(unpaidX.length){
      html += `<p class="hint">Spese comuni da pagare: ${unpaidX.map(x=>`<strong>${esc(x.name)}</strong> (${eur(x.amount)})`).join(", ")} — vedi tab Spese.</p>`;
    }else if(tx.nTot>0){
      html += `<p class="hint" style="color:var(--verde);font-weight:700">✓ Anche le spese comuni del mese sono pagate.</p>`;
    }
  }
  html += `</div>`;

  /* withdrawals per person */
  if(state.people.length){
    html += `<div class="card"><h2 class="sec">Prelievi dalla cassa</h2>
      <table class="tbl"><thead><tr><th>Persona</th><th class="r">Ultimo prelievo</th><th class="r">Totale prelevato (da sempre)</th></tr></thead><tbody>`;
    state.people.forEach(p=>{
      const last = state.withdrawals
        .filter(w=>w.personId===p.id)
        .sort((a,b)=>(b.date||"").localeCompare(a.date||""))[0];
      html += `<tr>
        <td><span class="avatar" style="background:${p.color};margin-right:8px">${esc(initials(p.name))}</span>${esc(p.name)}</td>
        <td class="r">${last?`${fmtDate(last.date)} — <strong>${eur(last.amount)}</strong>${last.fund==="contanti"?' <span class="small muted">(contanti)</span>':""}`:"—"}</td>
        <td class="r" style="font-weight:700">${eur(personWithdrawn(p.id))}</td></tr>`;
    });
    html += `</tbody></table></div>`;
  }

  app.innerHTML = html;
}

/* ---------- Registro ---------- */
function renderRegistro(){
  const y=view.y, m=view.m;
  const t = monthTotals(y,m);
  const pct = t.due>0 ? Math.round(t.paid/t.due*100) : 0;

  /* entries due this month, sorted by due day (no due day last) */
  const cfg = monthConfig(y,m);
  const due = dueEntries(y,m).slice().sort((a,b)=>(a.dueDay||99)-(b.dueDay||99));
  const notDueCount = cfg.entries.length - due.length;
  const unpaid = due.filter(e=>!isPaid(y,m,e.id));
  const unassigned = due.filter(e=>!e.peopleIds || !e.peopleIds.length);
  const today = new Date();
  const isCurrentMonth = (y===today.getFullYear() && m===today.getMonth());
  const isPastMonth = isPastMonthYM(y,m);
  const isLate = e => !isPaid(y,m,e.id) && !!e.dueDay && (isPastMonth || (isCurrentMonth && today.getDate()>e.dueDay));
  const frozen = isFrozen(y,m);
  const monthHasData = !!(state.payments[mk(y,m)] || state.expensePayments[mk(y,m)]);

  let html = `
    <div class="monthnav">
      <button id="prev-m" aria-label="Mese precedente">‹</button>
      <div class="mtitle">${MESI[m]} ${y}</div>
      <button id="next-m" aria-label="Mese successivo">›</button>
    </div>

    <div class="strip">
      <div class="box"><div class="lbl">Totale mese</div><div class="val">${eur(t.due)}</div></div>
      <div class="box"><div class="lbl">Pagato</div><div class="val green">${eur(t.paid)}</div></div>
      <div class="box"><div class="lbl">Da pagare</div><div class="val ${t.due-t.paid>0.005?'red':''}">${eur(Math.max(t.due-t.paid,0))}</div></div>
    </div>
    <div class="progress" role="progressbar" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100" aria-label="Avanzamento pagamenti">
      <div class="fill" style="width:${pct}%"></div>
    </div>`;

  /* excluded / past-month actions */
  const excluded = isExcluded(y,m);
  if(excluded){
    html += `<div class="monthactions excluded">
      <div class="ma-note">🚫 Mese escluso dai conteggi: non genera dovuto, quote, arretrati e vale zero nei grafici (es. periodo senza affitti).</div>
      <div class="ma-btns"><button class="btn ghost sm" id="ma-include">Riattiva mese</button></div>
    </div>`;
  } else if(isPastMonth){
    html += `<div class="monthactions">
      <div class="ma-note">${frozen
        ? `🔒 Mese passato — usa la configurazione congelata${state.monthSetups[mk(y,m)].frozenAt?` (salvata il ${fmtDate(state.monthSetups[mk(y,m)].frozenAt)})`:""}. Le modifiche in Gestione non lo toccano.`
        : `Mese passato senza dati: puoi replicare il setup attuale e segnarlo pagato, escluderlo dai conteggi, o lasciarlo vuoto.`}</div>
      <div class="ma-btns">
        ${unpaid.length ? `<button class="btn sm" id="ma-payall">Replica setup: segna tutto pagato</button>` : ""}
        ${frozen ? `<button class="btn ghost sm" id="ma-refreeze">Aggiorna alla config attuale</button>` : ""}
        <button class="btn ghost sm" id="ma-exclude">Escludi mese dai conteggi</button>
        ${(monthHasData||frozen) ? `<button class="btn danger sm" id="ma-clear">Svuota mese</button>` : ""}
      </div>
    </div>`;
  }

  /* status banner */
  if(due.length && !unpaid.length){
    html += `<div class="allok">✓ Tutto pagato per ${MESI[m].toLowerCase()} — ottimo lavoro.</div>`;
  } else if(unpaid.length){
    html += `<div class="alertbox"><h3>Chi non ha ancora pagato</h3><ul>`;
    unpaid.forEach(e=>{
      const names = (e.peopleIds||[]).map(id=>{const p=personById(id);return p?esc(p.name):null}).filter(Boolean);
      const scad = e.dueDay ? ` · entro il ${e.dueDay}` : "";
      const late = isLate(e) ? ` <strong style="color:var(--rosso)">⏰ in ritardo</strong>` : "";
      html += `<li><strong>${esc(e.name)}</strong> — ${eur(e.amount)}${scad}${names.length? " · "+names.join(", "):" · <em>non assegnata</em>"}${late}</li>`;
    });
    html += `</ul></div>`;
  }

  /* entries checklist */
  html += `<div class="card"><h2 class="sec">Voci del mese — ${t.nPaid} di ${t.nTot} pagate</h2>`;
  if(excluded){
    html += `<p class="muted">Mese escluso dai conteggi: nessuna voce dovuta.</p>`;
  } else if(!cfg.entries.length){
    html += `<p class="muted">Nessuna voce. Aggiungile in <strong>Gestione</strong>.</p>`;
  } else if(!due.length){
    html += `<p class="muted">Nessuna voce in scadenza questo mese.</p>`;
  }
  due.forEach(e=>{
    const paid = isPaid(y,m,e.id);
    const rec = monthPayments(y,m)[e.id];
    const chips = (e.peopleIds||[]).map(id=>{
      const p=personById(id);
      return p?`<span class="avatar" style="background:${p.color}" title="${esc(p.name)}">${esc(initials(p.name))}</span>`:"";
    }).join("");
    const metaParts = [];
    if(e.dueDay) metaParts.push(isLate(e) ? `<span class="late">⏰ entro il ${e.dueDay} — in ritardo</span>` : `entro il ${e.dueDay}`);
    if(freqOf(e)>1) metaParts.push(FREQ_LABELS[freqOf(e)].toLowerCase());
    if(cashOf(e)>0) metaParts.push(`<span class="cashtag">di cui ${eur(cashOf(e))} in contanti</span>`);
    const fpc = futurePaidCount(e,y,m);
    if(fpc>0) metaParts.push(`<span class="ahead">✓ pagato per ${fpc===1?"1 mese futuro":fpc+" mesi futuri"}</span>`);
    const isOpen = view.expandedEntry===e.id;
    const isEditOpen = view.expandedEdit===e.id && isPastMonth;
    let panel = "";
    if(isOpen){
      const nexts = nextDueMonths(e, y, m, freqOf(e)===12 ? 3 : 6);
      panel = `<div class="futuri">
        <div class="ftitle">Paga in anticipo — prossime scadenze di "${esc(e.name)}"</div>
        <div class="fpills">` +
        nexts.map(o=>{
          const p2 = isPaid(o.y,o.m,e.id);
          return `<button class="fpill ${p2?'on':''}" data-fut="${e.id}|${o.y}|${o.m}" aria-pressed="${p2}" aria-label="${MESI[o.m]} ${o.y}: ${p2?'pagato, tocca per annullare':'tocca per segnare pagato'}">${p2?'✓ ':''}${MESI_SHORT[o.m]}${o.y!==y?" "+o.y:""}</button>`;
        }).join("") +
        `</div><div class="fhint">Tocca un mese per timbrarlo come pagato (o per annullare). Gli importi versati finiscono in Cassa come gli altri pagamenti.</div></div>`;
    } else if(isEditOpen){
      panel = `<div class="futuri">
        <div class="ftitle">Modifica solo per ${MESI[m]} ${y} — "${esc(e.name)}"</div>
        <div class="srcrow">
          <label class="optl">Importo del mese €
            <input type="number" min="0" step="0.01" value="${e.amount}" data-medamount="${e.id}" style="width:120px">
          </label>
          <button class="btn danger sm" data-meddel="${e.id}">Rimuovi voce da questo mese</button>
        </div>
        <div class="fhint">Le modifiche valgono solo per questo mese${frozen?"":" (verrà congelato con la configurazione attuale)"}: la voce in Gestione e gli altri mesi non cambiano. Se la voce è già pagata, l'importo del pagamento in cassa viene aggiornato di conseguenza; rimuovendola, il suo pagamento del mese viene annullato.</div>
      </div>`;
    }
    html += `
      <div class="voce">
        <div class="info">
          <div class="nome">${esc(e.name)}</div>
          ${metaParts.length?`<div class="scadenza">${metaParts.join(" · ")}</div>`:""}
          ${e.note?`<div class="scadenza notetxt">📝 ${esc(e.note)}</div>`:""}
          <div class="chi">${chips || '<span class="no-people">⚠ nessuna persona assegnata</span>'}</div>
        </div>
        <div class="euro">${eur(e.amount)}</div>
        <div class="stampcol">
          <button class="stampbtn" data-toggle="${e.id}" aria-pressed="${paid}" aria-label="${paid?'Segna come non pagato':'Segna come pagato'}: ${esc(e.name)}">
            ${paid
              ? `<span class="stamp ${justStamped===e.id?'new':''}">✓ Pagato${rec&&rec.at?`<small>${rec.at.split('-').reverse().join('/')}</small>`:""}</span>`
              : `<span class="tostamp">Segna pagato</span>`}
          </button>
          <button class="morebtn" data-more="${e.id}" aria-expanded="${isOpen}">${isOpen?"chiudi":"+ altri mesi"}</button>
          ${isPastMonth?`<button class="morebtn" data-medit="${e.id}" aria-expanded="${isEditOpen}">${isEditOpen?"chiudi":"✎ modifica mese"}</button>`:""}
        </div>
      </div>${panel}`;
  });
  if(notDueCount>0 && !excluded){
    html += `<p class="hint" style="margin-top:12px">${notDueCount===1?"1 voce non è in scadenza":notDueCount+" voci non sono in scadenza"} questo mese per via della frequenza impostata.</p>`;
  }
  html += `</div>`;

  /* person quotas */
  if(state.people.length && !excluded){
    html += `<div class="card"><h2 class="sec">Quote per persona — ${MESI[m]}</h2><div class="persone-grid">`;
    state.people.forEach(p=>{
      const q = personMonth(y,m,p.id);
      let stato, cls;
      if(q.due<=0.005){ stato="Nessuna quota"; cls="parziale"; }
      else if(q.paid>=q.due-0.005){ stato="In regola"; cls="ok"; }
      else if(q.paid>0.005){ stato="Parziale"; cls="parziale"; }
      else { stato="Da pagare"; cls="no"; }
      html += `
        <div class="pcard">
          <div class="ptop">
            <span class="avatar" style="background:${p.color}">${esc(initials(p.name))}</span>
            <span class="pname">${esc(p.name)}</span>
          </div>
          <div class="prow"><span class="muted">Quota mese</span><span class="amount">${eur(q.due)}</span></div>
          <div class="prow"><span class="muted">Coperto</span><span class="amount" style="color:var(--verde)">${eur(q.paid)}</span></div>
          <div class="prow"><span class="muted">Residuo</span><span class="amount" style="color:${q.due-q.paid>0.005?'var(--rosso)':'inherit'}">${eur(Math.max(q.due-q.paid,0))}</span></div>
          <span class="stato ${cls}">${stato}</span>
        </div>`;
    });
    html += `</div>
      <p class="hint">La quota di ogni voce segue la ripartizione impostata in Gestione (parti uguali, percentuali o importi fissi). "Coperto" indica la parte di quota le cui voci risultano già timbrate come pagate.</p>
    </div>`;
  }

  if(unassigned.length){
    html += `<p class="hint">⚠ ${unassigned.length===1?"Una voce non è assegnata a nessuno":unassigned.length+" voci non sono assegnate a nessuno"} — il totale del mese non coincide con la somma delle quote. Sistemale in <strong>Gestione</strong>.</p>`;
  }

  app.innerHTML = html;
  justStamped = null;

  document.getElementById("prev-m").onclick = ()=>{ view.m--; if(view.m<0){view.m=11;view.y--;} render(); };
  document.getElementById("next-m").onclick = ()=>{ view.m++; if(view.m>11){view.m=0;view.y++;} render(); };
  const maPay = document.getElementById("ma-payall");
  if(maPay) maPay.onclick = async ()=>{
    if(await askConfirm(`Segnare come pagate tutte le ${unpaid.length} voci in scadenza di ${MESI[m]} ${y}?${frozen?"":" Il mese verrà congelato con la configurazione attuale (replica del setup corrente)."} Gli importi finiranno in cassa.`, "Segna tutto pagato")){
      ensureFrozenIfPast(y,m);
      const conf = monthConfig(y,m);
      conf.entries.forEach(e=>{
        if(isDue(e,y,m) && !isPaid(y,m,e.id)){
          const day = Math.min(e.dueDay||1, 28);
          stampPaid(y,m,e, `${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`);
        }
      });
      save(); render();
    }
  };
  const maRefreeze = document.getElementById("ma-refreeze");
  if(maRefreeze) maRefreeze.onclick = async ()=>{
    if(await askConfirm(`Sostituire la configurazione congelata di ${MESI[m]} ${y} con quella attuale di Gestione? I pagamenti già timbrati restano invariati; cambiano importi dovuti, quote e voci mostrate per questo mese.`, "Aggiorna")){
      freezeMonth(y,m);
      save(); render();
    }
  };
  const maExclude = document.getElementById("ma-exclude");
  if(maExclude) maExclude.onclick = async ()=>{
    const hasData = monthHasData;
    const msg = hasData
      ? `Escludere ${MESI[m]} ${y} dai conteggi? Il mese contiene dei dati: verranno rimossi (pagamenti, spese e configurazione congelata) e gli importi usciranno dalla cassa. Il mese varrà zero nel dovuto annuale e nei grafici.`
      : `Escludere ${MESI[m]} ${y} dai conteggi? Il mese varrà zero nel dovuto annuale, nei grafici, nelle quote e negli arretrati. Potrai riattivarlo in ogni momento.`;
    if(await askConfirm(msg, "Escludi mese")){
      const key = mk(y,m);
      delete state.payments[key];
      delete state.expensePayments[key];
      delete state.monthSetups[key];
      state.excludedMonths[key] = true;
      save(); render();
    }
  };
  const maInclude = document.getElementById("ma-include");
  if(maInclude) maInclude.onclick = async ()=>{
    if(await askConfirm(`Riattivare ${MESI[m]} ${y}? Il mese tornerà a contare nel dovuto e nei grafici con la configurazione attuale.`, "Riattiva")){
      delete state.excludedMonths[mk(y,m)];
      save(); render();
    }
  };
  const maClear = document.getElementById("ma-clear");
  if(maClear) maClear.onclick = async ()=>{
    if(await askConfirm(`Svuotare completamente ${MESI[m]} ${y}? Verranno rimossi: pagamenti delle voci, pagamenti delle spese e la configurazione congelata del mese. Gli importi versati usciranno dal saldo della cassa. L'operazione non è reversibile.`, "Svuota mese")){
      const key = mk(y,m);
      delete state.payments[key];
      delete state.expensePayments[key];
      delete state.monthSetups[key];
      save(); render();
    }
  };
  app.querySelectorAll("[data-toggle]").forEach(b=>{
    b.onclick = ()=> togglePaid(view.y, view.m, b.dataset.toggle);
  });
  app.querySelectorAll("[data-more]").forEach(b=>{
    b.onclick = ()=>{
      view.expandedEntry = (view.expandedEntry===b.dataset.more) ? null : b.dataset.more;
      view.expandedEdit = null;
      render();
    };
  });
  app.querySelectorAll("[data-medit]").forEach(b=>{
    b.onclick = ()=>{
      view.expandedEdit = (view.expandedEdit===b.dataset.medit) ? null : b.dataset.medit;
      view.expandedEntry = null;
      render();
    };
  });
  app.querySelectorAll("[data-medamount]").forEach(inp=>{
    inp.onchange = ()=>{
      const v = parseFloat(inp.value);
      if(isNaN(v) || v<0){ notify("Inserisci un importo valido."); return; }
      ensureFrozenIfPast(view.y, view.m);
      const setup = state.monthSetups[mk(view.y,view.m)];
      if(!setup) return;
      const e = setup.entries.find(x=>x.id===inp.dataset.medamount);
      if(!e) return;
      e.amount = v;
      if((e.cashAmount||0) > v) e.cashAmount = v;
      /* se già pagata in questo mese, allinea il pagamento in cassa */
      const key = mk(view.y,view.m);
      const rec = state.payments[key] && state.payments[key][e.id];
      if(rec){
        rec.amount = v;
        if((rec.cash||0) > v) rec.cash = v;
      }
      save(); render();
    };
  });
  app.querySelectorAll("[data-meddel]").forEach(b=>{
    b.onclick = async ()=>{
      ensureFrozenIfPast(view.y, view.m);
      const setup = state.monthSetups[mk(view.y,view.m)];
      if(!setup) return;
      const e = setup.entries.find(x=>x.id===b.dataset.meddel);
      if(!e) return;
      const key = mk(view.y,view.m);
      const wasPaid = !!(state.payments[key] && state.payments[key][e.id]);
      if(await askConfirm(`Rimuovere "${e.name}" solo da ${MESI[view.m]} ${view.y}?${wasPaid?" Il suo pagamento del mese verrà annullato e l'importo uscirà dalla cassa.":""} Gli altri mesi e la voce in Gestione non cambiano.`, "Rimuovi dal mese")){
        setup.entries = setup.entries.filter(x=>x.id!==e.id);
        if(state.payments[key]){
          delete state.payments[key][e.id];
          if(!Object.keys(state.payments[key]).length) delete state.payments[key];
        }
        view.expandedEdit = null;
        save(); render();
      }
    };
  });
  app.querySelectorAll("[data-fut]").forEach(b=>{
    b.onclick = ()=>{
      const parts = b.dataset.fut.split("|");
      togglePaid(parseInt(parts[1],10), parseInt(parts[2],10), parts[0], false);
    };
  });
}

/* ---------- Spese comuni ---------- */
function renderSpese(){
  const y=view.y, m=view.m;
  const t = expenseMonthTotals(y,m);
  const todayIso = new Date().toISOString().slice(0,10);
  const today = new Date();
  const isCurrentMonth = (y===today.getFullYear() && m===today.getMonth());
  const isPastMonth = (y<today.getFullYear() || (y===today.getFullYear() && m<today.getMonth()));

  const cfg = monthConfig(y,m);
  const frozen = isFrozen(y,m);
  const excluded = isExcluded(y,m);
  const due = excluded ? [] : cfg.expenses.filter(x=>isDue(x,y,m)).slice().sort((a,b)=>(a.dueDay||99)-(b.dueDay||99));
  const notDueCount = cfg.expenses.length - due.length;
  const unpaid = due.filter(x=>!isExpPaid(y,m,x.id));
  const isLate = x => !isExpPaid(y,m,x.id) && !!x.dueDay && (isPastMonth || (isCurrentMonth && today.getDate()>x.dueDay));

  let html = `
    <div class="monthnav">
      <button id="prev-m" aria-label="Mese precedente">‹</button>
      <div class="mtitle">${MESI[m]} ${y}</div>
      <button id="next-m" aria-label="Mese successivo">›</button>
    </div>
    <div class="strip">
      <div class="box"><div class="lbl">Spese del mese</div><div class="val">${eur(t.due)}</div></div>
      <div class="box"><div class="lbl">Pagate</div><div class="val green">${eur(t.paid)}</div></div>
      <div class="box"><div class="lbl">Da pagare</div><div class="val ${t.due-t.paid>0.005?'red':''}">${eur(Math.max(t.due-t.paid,0))}</div></div>
    </div>
    ${excluded ? `<div class="monthactions excluded"><div class="ma-note">🚫 Mese escluso dai conteggi (gestiscilo dalla tab Registro): nessuna spesa dovuta.</div></div>`
      : isPastMonth && frozen ? `<div class="monthactions"><div class="ma-note">🔒 Mese passato — usa la configurazione congelata. Per svuotarlo o aggiornarlo, usa le azioni nella tab Registro (valgono per l'intero mese).</div></div>` : ""}`;

  if(due.length && !unpaid.length){
    html += `<div class="allok">✓ Tutte le spese di ${MESI[m].toLowerCase()} sono pagate.</div>`;
  } else if(unpaid.length){
    html += `<div class="alertbox"><h3>Spese non ancora pagate</h3><ul>`;
    unpaid.forEach(x=>{
      const names = (x.peopleIds||[]).map(id=>{const p=personById(id);return p?esc(p.name):null}).filter(Boolean);
      const scad = x.dueDay ? ` · entro il ${x.dueDay}` : "";
      const late = isLate(x) ? ` <strong style="color:var(--rosso)">⏰ in ritardo</strong>` : "";
      html += `<li><strong>${esc(x.name)}</strong> — ${eur(x.amount)}${scad}${names.length? " · a carico di "+names.join(", "):" · <em>non assegnata</em>"}${late}</li>`;
    });
    html += `</ul></div>`;
  }

  /* checklist */
  html += `<div class="card"><h2 class="sec">Spese del mese — ${t.nPaid} di ${t.nTot} pagate</h2>`;
  if(!cfg.expenses.length){
    html += `<p class="muted">Nessuna spesa comune. Aggiungila qui sotto in <strong>Gestione spese</strong>.</p>`;
  } else if(!due.length){
    html += `<p class="muted">Nessuna spesa in scadenza questo mese.</p>`;
  }
  due.forEach(x=>{
    const rec = expPayments(y,m)[x.id];
    const paid = !!rec;
    const chips = (x.peopleIds||[]).map(id=>{
      const p=personById(id);
      return p?`<span class="avatar" style="background:${p.color}" title="${esc(p.name)}">${esc(initials(p.name))}</span>`:"";
    }).join("");
    const metaParts = [];
    if(x.dueDay) metaParts.push(isLate(x) ? `<span class="late">⏰ entro il ${x.dueDay} — in ritardo</span>` : `entro il ${x.dueDay}`);
    if(freqOf(x)>1) metaParts.push(FREQ_LABELS[freqOf(x)].toLowerCase());
    if(paid){
      if(rec.source==="cassa") metaParts.push(`<span class="ahead">💶 pagata dalla cassa (conto)</span>`);
      else if(rec.source==="contanti") metaParts.push(`<span class="ahead">💵 pagata dalla cassa contanti</span>`);
      else metaParts.push(`<span class="src-est">pagata da altri conti</span>`);
    }

    const isOpen = view.expandedExpense===x.id && !paid;
    let panel = "";
    if(isOpen){
      panel = `<div class="futuri">
        <div class="ftitle">Registra il pagamento — "${esc(x.name)}" · ${eur(x.amount)}</div>
        <div class="srcrow">
          <label class="optl">Giorno del pagamento
            <input type="date" id="xdate-${x.id}" value="${todayIso}">
          </label>
          <button class="btn sm" data-xsrc="${x.id}|cassa">Dalla cassa (conto)</button>
          <button class="btn sm" data-xsrc="${x.id}|contanti">Dalla cassa contanti</button>
          <button class="btn ghost sm" data-xsrc="${x.id}|esterno">Da altri conti</button>
        </div>
        <div class="fhint">Le prime due opzioni scalano l'importo dal fondo scelto (conto o contanti) e compaiono nei movimenti della Cassa. "Da altri conti" registra solo che la spesa è stata pagata, senza toccare i fondi — utile quando il pagamento non passa da questo sistema.</div>
      </div>`;
    }

    const srcSmall = paid ? (rec.source==="cassa" ? " · conto" : rec.source==="contanti" ? " · contanti" : "") : "";
    html += `
      <div class="voce">
        <div class="info">
          <div class="nome">${esc(x.name)}</div>
          ${metaParts.length?`<div class="scadenza">${metaParts.join(" · ")}</div>`:""}
          <div class="chi">${chips || '<span class="no-people">⚠ nessuna persona assegnata</span>'}</div>
        </div>
        <div class="euro">${eur(x.amount)}</div>
        <button class="stampbtn" data-xtoggle="${x.id}" aria-pressed="${paid}" aria-expanded="${isOpen}" aria-label="${paid?'Annulla pagamento':'Registra pagamento'}: ${esc(x.name)}">
          ${paid
            ? `<span class="stamp">✓ Pagata<small>${rec.at?rec.at.split('-').reverse().join('/'):""}${srcSmall}</small></span>`
            : `<span class="tostamp">${isOpen?"Annulla":"Segna pagata"}</span>`}
        </button>
      </div>${panel}`;
  });
  if(notDueCount>0 && !excluded){
    html += `<p class="hint" style="margin-top:12px">${notDueCount===1?"1 spesa non è in scadenza":notDueCount+" spese non sono in scadenza"} questo mese per via della ricorrenza impostata.</p>`;
  }
  html += `</div>`;

  /* per-person quotas */
  if(state.people.length && due.length){
    html += `<div class="card"><h2 class="sec">Quote spese per persona — ${MESI[m]}</h2>
      <table class="tbl"><thead><tr><th>Persona</th><th class="r">Quota mese</th><th class="r">Di cui pagata</th><th class="r">Residuo</th></tr></thead><tbody>`;
    state.people.forEach(p=>{
      const q = personExpMonth(y,m,p.id);
      if(q.due<=0.005) return;
      html += `<tr>
        <td><span class="avatar" style="background:${p.color};margin-right:8px">${esc(initials(p.name))}</span>${esc(p.name)}</td>
        <td class="r">${eur(q.due)}</td>
        <td class="r" style="color:var(--verde);font-weight:700">${eur(q.paid)}</td>
        <td class="r" style="color:${q.due-q.paid>0.005?'var(--rosso)':'inherit'};font-weight:700">${eur(Math.max(q.due-q.paid,0))}</td></tr>`;
    });
    html += `</tbody></table>
    <p class="hint">La quota indica la parte di spesa a carico di ciascuno (divisione in parti uguali tra gli assegnati). Se una spesa è pagata dalla cassa comune, la quota risulta comunque coperta perché il fondo appartiene a tutti.</p></div>`;
  }

  /* management */
  let xhtml = "";
  state.expenses.forEach(x=>{
    const chips = state.people.map(p=>{
      const on = (x.peopleIds||[]).includes(p.id);
      return `<button class="chip ${on?'on':''}" data-xchip="${x.id}|${p.id}" aria-pressed="${on}">
        <span class="dotc" style="${on?`background:${p.color}`:""}"></span>${esc(p.name)}</button>`;
    }).join("");
    const f = freqOf(x);
    const freqSel = `<label class="optl">Ricorrenza
      <select data-xfreq="${x.id}">${[1,2,3,4,6,12].map(v=>`<option value="${v}" ${v===f?"selected":""}>${FREQ_LABELS[v]}</option>`).join("")}</select></label>`;
    const anchorSel = f>1 ? `<label class="optl">Mese in cui scade
      <select data-xanchor="${x.id}">${MESI.map((n,i)=>`<option value="${i}" ${i===((typeof x.anchorMonth==="number")?x.anchorMonth:0)?"selected":""}>${n}</option>`).join("")}</select></label>` : "";
    const daySel = `<label class="optl">Entro il giorno
      <input type="number" min="1" max="31" step="1" value="${x.dueDay||""}" placeholder="—" data-xday="${x.id}" style="width:80px"></label>`;
    xhtml += `
      <div class="gvoce">
        <input type="text" value="${esc(x.name)}" data-xname="${x.id}" aria-label="Nome spesa">
        <input type="number" step="0.01" min="0" value="${x.amount}" data-xamount="${x.id}" aria-label="Importo in euro">
        <button class="btn danger sm" data-xdel="${x.id}">Elimina</button>
        <div class="opts">${freqSel}${anchorSel}${daySel}</div>
        <div class="chips">${chips || '<span class="muted small">Aggiungi prima delle persone in Gestione per assegnare la spesa.</span>'}</div>
      </div>`;
  });
  html += `
    <div class="card">
      <h2 class="sec">Gestione spese</h2>
      ${xhtml || '<p class="muted">Nessuna spesa ancora. Esempi: IMU, assicurazione casa, manutenzione caldaia…</p>'}
      <div class="addrow">
        <input type="text" id="new-xname" placeholder="Nuova spesa (es. IMU, assicurazione…)" aria-label="Nome nuova spesa">
        <input type="number" id="new-xamount" step="0.01" min="0" placeholder="€" aria-label="Importo nuova spesa">
        <button class="btn" id="add-expense">Aggiungi</button>
      </div>
      <p class="hint">Tocca i nomi sotto ogni spesa per scegliere chi la deve sostenere. La ricorrenza funziona come nel Registro: la spesa compare solo nei mesi in cui scade.</p>
    </div>`;

  app.innerHTML = html;

  document.getElementById("prev-m").onclick = ()=>{ view.m--; if(view.m<0){view.m=11;view.y--;} render(); };
  document.getElementById("next-m").onclick = ()=>{ view.m++; if(view.m>11){view.m=0;view.y++;} render(); };

  app.querySelectorAll("[data-xtoggle]").forEach(b=>{
    b.onclick = async ()=>{
      const id = b.dataset.xtoggle;
      if(isExpPaid(view.y,view.m,id)){
        const rec = expPayments(view.y,view.m)[id];
        const extra = rec.source==="cassa" ? " L'importo tornerà nel saldo della cassa (conto)."
          : rec.source==="contanti" ? " L'importo tornerà nel saldo della cassa contanti." : "";
        if(await askConfirm("Annullare il pagamento di questa spesa?"+extra, "Annulla pagamento")) unmarkExpPaid(view.y,view.m,id);
      }else{
        view.expandedExpense = (view.expandedExpense===id) ? null : id;
        render();
      }
    };
  });
  app.querySelectorAll("[data-xsrc]").forEach(b=>{
    b.onclick = ()=>{
      const parts = b.dataset.xsrc.split("|");
      const dateInp = document.getElementById("xdate-"+parts[0]);
      markExpPaid(view.y, view.m, parts[0], parts[1], dateInp && dateInp.value ? dateInp.value : null);
    };
  });
  app.querySelectorAll("[data-xname]").forEach(inp=>{
    inp.onchange = ()=>{
      const x = state.expenses.find(e=>e.id===inp.dataset.xname);
      if(x && inp.value.trim()){ x.name = inp.value.trim(); save(); }
    };
  });
  app.querySelectorAll("[data-xamount]").forEach(inp=>{
    inp.onchange = ()=>{
      const x = state.expenses.find(e=>e.id===inp.dataset.xamount);
      const v = parseFloat(inp.value);
      if(x && !isNaN(v) && v>=0){ x.amount = v; save(); }
    };
  });
  app.querySelectorAll("[data-xfreq]").forEach(sel=>{
    sel.onchange = ()=>{
      const x = state.expenses.find(e=>e.id===sel.dataset.xfreq);
      if(!x) return;
      x.freq = parseInt(sel.value,10) || 1;
      if(x.freq>1 && typeof x.anchorMonth!=="number") x.anchorMonth = now.getMonth();
      save(); render();
    };
  });
  app.querySelectorAll("[data-xanchor]").forEach(sel=>{
    sel.onchange = ()=>{
      const x = state.expenses.find(e=>e.id===sel.dataset.xanchor);
      if(x){ x.anchorMonth = parseInt(sel.value,10) || 0; save(); }
    };
  });
  app.querySelectorAll("[data-xday]").forEach(inp=>{
    inp.onchange = ()=>{
      const x = state.expenses.find(e=>e.id===inp.dataset.xday);
      if(!x) return;
      const v = parseInt(inp.value,10);
      x.dueDay = (!isNaN(v) && v>=1 && v<=31) ? v : null;
      if(x.dueDay===null) inp.value = "";
      save();
    };
  });
  app.querySelectorAll("[data-xchip]").forEach(b=>{
    b.onclick = ()=>{
      const [xid,pid] = b.dataset.xchip.split("|");
      const x = state.expenses.find(e=>e.id===xid);
      if(!x) return;
      if(!x.peopleIds) x.peopleIds = [];
      const i = x.peopleIds.indexOf(pid);
      if(i>=0) x.peopleIds.splice(i,1); else x.peopleIds.push(pid);
      save(); render();
    };
  });
  app.querySelectorAll("[data-xdel]").forEach(b=>{
    b.onclick = async ()=>{
      const x = state.expenses.find(e=>e.id===b.dataset.xdel);
      if(!x) return;
      if(await askConfirm(`Eliminare la spesa "${x.name}"? Verranno rimossi i suoi pagamenti del mese corrente e futuri (quelli dalla cassa torneranno nel saldo); i mesi passati congelati restano invariati.`, "Elimina")){
        state.expenses = state.expenses.filter(e=>e.id!==x.id);
        Object.keys(state.expensePayments).forEach(k=>{
          if(state.monthSetups[k]) return; /* mese congelato: lo storico non si tocca */
          delete state.expensePayments[k][x.id];
          if(!Object.keys(state.expensePayments[k]).length) delete state.expensePayments[k];
        });
        save(); render();
      }
    };
  });
  document.getElementById("add-expense").onclick = ()=>{
    const name = document.getElementById("new-xname").value.trim();
    const amt = parseFloat(document.getElementById("new-xamount").value);
    if(!name || isNaN(amt) || amt<0){ notify("Inserisci un nome e un importo valido."); return; }
    state.expenses.push({id:uid(), name, amount:amt, peopleIds: state.people.map(p=>p.id), freq:1, dueDay:null});
    save(); render();
  };
}

/* ---------- Cassa ---------- */
function renderCassa(){
  const yC = view.cassaY;
  const bal = fundBalances();
  const saldoTot = bal.conto + bal.contanti;
  const todayIso = new Date().toISOString().slice(0,10);

  /* per-person table */
  let ptable = "";
  if(state.people.length){
    ptable = `<div class="card"><h2 class="sec">Prelievi per persona</h2>
      <table class="tbl"><thead><tr><th>Persona</th><th class="r">Prelevato ${yC}</th><th class="r">Prelevato totale</th><th class="r">Ultimo prelievo</th></tr></thead><tbody>`;
    state.people.forEach(p=>{
      const last = state.withdrawals
        .filter(w=>w.personId===p.id)
        .sort((a,b)=>(b.date||"").localeCompare(a.date||""))[0];
      ptable += `<tr>
        <td><span class="avatar" style="background:${p.color};margin-right:8px">${esc(initials(p.name))}</span>${esc(p.name)}</td>
        <td class="r">${eur(personWithdrawn(p.id, yC))}</td>
        <td class="r" style="font-weight:700">${eur(personWithdrawn(p.id))}</td>
        <td class="r">${last?fmtDate(last.date):"—"}</td></tr>`;
    });
    ptable += `</tbody></table>
    <div class="yearpick">
      <button class="btn ghost sm" id="cassa-prev-y" aria-label="Anno precedente">‹</button>
      <span class="small" style="font-weight:800">Anno ${yC}</span>
      <button class="btn ghost sm" id="cassa-next-y" aria-label="Anno successivo">›</button>
    </div></div>`;
  }

  /* movements list: personal withdrawals + expenses paid from the funds */
  const movs = state.withdrawals.map(w=>({kind:"prelievo", id:w.id, date:w.date||"", amount:w.amount, personId:w.personId, note:w.note, fund:w.fund==="contanti"?"contanti":"conto"}));
  Object.keys(state.expensePayments).forEach(k=>{
    Object.keys(state.expensePayments[k]).forEach(xid=>{
      const r = state.expensePayments[k][xid];
      if(r && (r.source==="cassa" || r.source==="contanti")){
        const x = state.expenses.find(e=>e.id===xid);
        const setup = state.monthSetups[k];
        const xs = x || (setup && setup.expenses.find(e=>e.id===xid));
        const km = k.split("-");
        movs.push({kind:"spesa", id:"x"+k+xid, date:r.at||"", amount:r.amount||0,
          name:(xs?xs.name:"Spesa"), fund:r.source==="contanti"?"contanti":"conto",
          meta:`competenza ${MESI[parseInt(km[1],10)-1]} ${km[0]}`});
      }
    });
  });
  movs.sort((a,b)=>{
    const d = (b.date||"").localeCompare(a.date||"");
    return d !== 0 ? d : (b.id > a.id ? 1 : -1);
  });
  let mhtml = "";
  movs.forEach(w=>{
    const fundTag = w.fund==="contanti" ? `<span class="tagcash">contanti</span>` : "";
    if(w.kind==="spesa"){
      mhtml += `
      <div class="mov">
        <span class="avatar xav">SP</span>
        <div class="minfo">
          <div class="mname">${esc(w.name)} <span class="tagspesa">spesa comune</span>${fundTag}</div>
          <div class="mmeta">${fmtDate(w.date)} · ${esc(w.meta)}</div>
        </div>
        <div class="euro" style="color:var(--rosso)">− ${eur(w.amount)}</div>
        <span class="small muted" style="width:34px;text-align:center" title="Gestita nella tab Spese">↗</span>
      </div>`;
      return;
    }
    const p = personById(w.personId);
    mhtml += `
      <div class="mov">
        <span class="avatar" style="background:${p?p.color:"#B0ADA2"}">${p?esc(initials(p.name)):"?"}</span>
        <div class="minfo">
          <div class="mname">${p?esc(p.name):"<em>persona rimossa</em>"}${fundTag}</div>
          <div class="mmeta">${fmtDate(w.date)}${w.note?` · ${esc(w.note)}`:""}</div>
        </div>
        <div class="euro" style="color:var(--rosso)">− ${eur(w.amount)}</div>
        <button class="btn danger sm" data-wdel="${w.id}" aria-label="Elimina prelievo">✕</button>
      </div>`;
  });

  app.innerHTML = `
    <div class="strip four">
      <div class="box"><div class="lbl">Versato totale</div><div class="val green">${eur(bal.totIn)}</div></div>
      <div class="box"><div class="lbl">Prelievi persone</div><div class="val red">${eur(bal.outPrelievi)}</div></div>
      <div class="box"><div class="lbl">Spese da cassa</div><div class="val red">${eur(bal.outSpese)}</div></div>
      <div class="box saldo ${saldoTot<-0.005?'neg':''}"><div class="lbl">Saldo totale</div><div class="val ${saldoTot<-0.005?'red':''}">${eur(saldoTot)}</div></div>
    </div>
    <div class="strip two">
      <div class="box saldo ${bal.conto<-0.005?'neg':''}"><div class="lbl">Saldo cassa · conto</div><div class="val ${bal.conto<-0.005?'red':''}">${eur(bal.conto)}</div><div class="lbl" style="margin-top:4px">entrate ${eur(bal.contoIn)}${state.initialBalance?` · iniziale ${eur(state.initialBalance)}`:""}</div></div>
      <div class="box saldo ${bal.contanti<-0.005?'neg':''}"><div class="lbl">Saldo cassa · contanti</div><div class="val ${bal.contanti<-0.005?'red':''}">${eur(bal.contanti)}</div><div class="lbl" style="margin-top:4px">entrate ${eur(bal.cashIn)}${state.initialCashBalance?` · iniziale ${eur(state.initialCashBalance)}`:""}</div></div>
    </div>
    ${saldoTot<-0.005||bal.conto<-0.005||bal.contanti<-0.005?`<div class="alertbox"><h3>Fondo in negativo</h3><ul><li>Le uscite superano quanto versato in almeno un fondo: controlla i movimenti, timbra i pagamenti mancanti nel Registro o imposta i saldi iniziali qui sotto.</li></ul></div>`:""}

    <div class="card">
      <h2 class="sec">Saldi iniziali dei fondi</h2>
      <div class="initrow">
        <label class="optl">Cassa conto (già presente all'inizio)
          <input type="number" id="init-balance" step="0.01" value="${state.initialBalance||0}" style="max-width:160px">
        </label>
        <label class="optl">Cassa contanti (già presente all'inizio)
          <input type="number" id="init-cash-balance" step="0.01" value="${state.initialCashBalance||0}" style="max-width:160px">
        </label>
        <button class="btn sm" id="init-save">Salva</button>
      </div>
      <p class="hint">Vengono sommati ai rispettivi saldi una volta sola: usali per far partire i fondi dal valore reale di oggi, senza dover ricostruire lo storico dei mesi passati.</p>
    </div>

    <div class="card">
      <h2 class="sec">Registra un prelievo</h2>
      <div class="wform">
        <label class="optl">Persona
          <select id="w-person">${state.people.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("")}</select>
        </label>
        <label class="optl">Importo €
          <input type="number" id="w-amount" step="0.01" min="0.01" placeholder="0,00">
        </label>
        <label class="optl">Fondo
          <select id="w-fund"><option value="conto">Cassa conto</option><option value="contanti">Cassa contanti</option></select>
        </label>
        <label class="optl">Giorno
          <input type="date" id="w-date" value="${todayIso}">
        </label>
        <label class="optl wnote">Nota (facoltativa)
          <input type="text" id="w-note" placeholder="es. bonifico proprietario, bolletta luce…">
        </label>
        <button class="btn" id="w-add">Registra prelievo</button>
      </div>
      ${!state.people.length?'<p class="hint">Aggiungi prima delle persone in <strong>Gestione</strong> per registrare i prelievi.</p>':'<p class="hint">Il versato è la somma dei pagamenti timbrati nel Registro: la parte "in contanti" delle voci finisce nella cassa contanti, il resto nella cassa conto. Prelievi e spese scalano dal fondo scelto.</p>'}
    </div>

    ${ptable}

    <div class="card">
      <h2 class="sec">Movimenti in uscita — ${movs.length} ${movs.length===1?"movimento":"movimenti"}</h2>
      ${mhtml || '<p class="muted">Nessun movimento registrato finora.</p>'}
      ${movs.some(w=>w.kind==="spesa")?'<p class="hint">Le righe "spesa comune" si gestiscono dalla tab <strong>Spese</strong>: per annullarle, annulla lì il pagamento della spesa.</p>':""}
    </div>
  `;

  if(document.getElementById("cassa-prev-y")) document.getElementById("cassa-prev-y").onclick = ()=>{ view.cassaY--; render(); };
  if(document.getElementById("cassa-next-y")) document.getElementById("cassa-next-y").onclick = ()=>{ view.cassaY++; render(); };

  document.getElementById("init-save").onclick = ()=>{
    const v = parseFloat(document.getElementById("init-balance").value);
    const vc = parseFloat(document.getElementById("init-cash-balance").value);
    if(isNaN(v) || isNaN(vc)){ notify("Inserisci importi validi (possono anche essere 0)."); return; }
    state.initialBalance = v;
    state.initialCashBalance = vc;
    save(); render();
  };

  document.getElementById("w-add").onclick = ()=>{
    if(!state.people.length){ notify("Aggiungi prima delle persone in Gestione."); return; }
    const personId = document.getElementById("w-person").value;
    const amount = parseFloat(document.getElementById("w-amount").value);
    const fund = document.getElementById("w-fund").value==="contanti" ? "contanti" : "conto";
    const date = document.getElementById("w-date").value || todayIso;
    const note = document.getElementById("w-note").value.trim();
    if(!personId || isNaN(amount) || amount<=0){ notify("Inserisci un importo valido."); return; }
    state.withdrawals.push({id:uid(), personId, amount, fund, date, note});
    save(); render();
  };
  app.querySelectorAll("[data-wdel]").forEach(b=>{
    b.onclick = async ()=>{
      const w = state.withdrawals.find(x=>x.id===b.dataset.wdel);
      if(!w) return;
      const p = personById(w.personId);
      if(await askConfirm(`Eliminare il prelievo di ${eur(w.amount)}${p?` di ${p.name}`:""} del ${fmtDate(w.date)}?`, "Elimina")){
        state.withdrawals = state.withdrawals.filter(x=>x.id!==w.id);
        save(); render();
      }
    };
  });
}

/* ---------- Grafici ---------- */
function renderGrafici(){
  const y = view.chartY;
  const months = [];
  let yearDue=0, yearPaid=0;
  for(let m=0;m<12;m++){
    const t = monthTotals(y,m);
    months.push(t);
    yearDue += t.due; yearPaid += t.paid;
  }
  const maxV = Math.max(1, ...months.map(t=>Math.max(t.due,t.paid)));

  /* SVG bar chart */
  const W=880, H=300, padL=64, padB=34, padT=16, padR=10;
  const plotW = W-padL-padR, plotH = H-padT-padB;
  const bw = plotW/12;
  let bars="", axis="";
  const steps=4;
  for(let i=0;i<=steps;i++){
    const v = maxV/steps*i;
    const yy = padT + plotH - (v/maxV)*plotH;
    axis += `<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="#E5E1D6" stroke-width="1"/>
             <text x="${padL-8}" y="${yy+4}" text-anchor="end" font-size="10.5" fill="#6B7078" font-family="inherit">${v>=1000?(v/1000).toFixed(1).replace('.',',')+'k':Math.round(v)}</text>`;
  }
  months.forEach((t,m)=>{
    const cx = padL + bw*m;
    const excl = isExcluded(y,m);
    const dueH = (t.due/maxV)*plotH;
    const paidH = (t.paid/maxV)*plotH;
    const barW = Math.min(34, bw*0.52);
    const x = cx + (bw-barW)/2;
    if(excl){
      bars += `<text x="${cx+bw/2}" y="${padT+plotH-6}" text-anchor="middle" font-size="13" fill="#B9B5AA" font-family="inherit">×</text>`;
    }else{
      bars += `<rect x="${x}" y="${padT+plotH-dueH}" width="${barW}" height="${Math.max(dueH,0)}" fill="#E3E0D6" rx="3"/>`;
      if(paidH>0) bars += `<rect x="${x}" y="${padT+plotH-paidH}" width="${barW}" height="${paidH}" fill="#1E7A46" rx="3"/>`;
    }
    const isCur = (y===view.y && m===view.m);
    bars += `<text x="${cx+bw/2}" y="${H-12}" text-anchor="middle" font-size="11" font-weight="${isCur?'800':'400'}" fill="${excl?'#B9B5AA':isCur?'#14181F':'#6B7078'}" font-family="inherit" ${excl?'text-decoration="line-through"':''}>${MESI_SHORT[m]}</text>`;
  });

  /* per-person yearly table */
  let ptable = "";
  if(state.people.length){
    ptable = `<div class="card"><h2 class="sec">Totali annuali per persona — ${y}</h2>
      <table class="tbl"><thead><tr><th>Persona</th><th class="r">Quota annua</th><th class="r">Coperto</th><th class="r">Residuo</th></tr></thead><tbody>`;
    state.people.forEach(p=>{
      let d=0,pa=0;
      for(let m=0;m<12;m++){ const q=personMonth(y,m,p.id); d+=q.due; pa+=q.paid; }
      ptable += `<tr>
        <td><span class="avatar" style="background:${p.color};margin-right:8px">${esc(initials(p.name))}</span>${esc(p.name)}</td>
        <td class="r">${eur(d)}</td>
        <td class="r" style="color:var(--verde);font-weight:700">${eur(pa)}</td>
        <td class="r" style="color:${d-pa>0.005?'var(--rosso)':'inherit'};font-weight:700">${eur(Math.max(d-pa,0))}</td></tr>`;
    });
    ptable += `</tbody></table></div>`;
  }

  /* monthly table */
  let mtable = `<div class="card"><h2 class="sec">Dettaglio mensile — ${y}</h2>
    <table class="tbl"><thead><tr><th>Mese</th><th class="r">Dovuto</th><th class="r">Pagato</th><th class="r">Voci pagate</th></tr></thead><tbody>`;
  let nExcl = 0;
  months.forEach((t,m)=>{
    if(isExcluded(y,m)){
      nExcl++;
      mtable += `<tr style="color:#B9B5AA"><td style="text-decoration:line-through">${MESI[m]}</td><td class="r" colspan="3">escluso dai conteggi</td></tr>`;
      return;
    }
    mtable += `<tr><td>${MESI[m]}</td><td class="r">${eur(t.due)}</td>
      <td class="r" style="color:${t.paid>0?'var(--verde)':'var(--grigio)'};font-weight:700">${eur(t.paid)}</td>
      <td class="r">${t.nPaid} / ${t.nTot}</td></tr>`;
  });
  mtable += `</tbody></table>${nExcl>0?`<p class="hint">${nExcl===1?"1 mese è escluso":nExcl+" mesi sono esclusi"} dai conteggi (vale zero nel dovuto ${y}). Puoi riattivarli dal Registro.</p>`:""}</div>`;

  app.innerHTML = `
    <div class="monthnav">
      <button id="prev-y" aria-label="Anno precedente">‹</button>
      <div class="mtitle">Anno ${y}</div>
      <button id="next-y" aria-label="Anno successivo">›</button>
    </div>
    <div class="strip">
      <div class="box"><div class="lbl">Dovuto ${y}</div><div class="val">${eur(yearDue)}</div></div>
      <div class="box"><div class="lbl">Pagato ${y}</div><div class="val green">${eur(yearPaid)}</div></div>
      <div class="box"><div class="lbl">Residuo ${y}</div><div class="val ${yearDue-yearPaid>0.005?'red':''}">${eur(Math.max(yearDue-yearPaid,0))}</div></div>
    </div>
    <div class="card">
      <h2 class="sec">Pagato vs dovuto per mese</h2>
      <div class="chartwrap">
        <svg viewBox="0 0 ${W} ${H}" width="100%" style="min-width:560px" role="img" aria-label="Grafico a barre: pagato e dovuto per mese">${axis}${bars}</svg>
      </div>
      <div class="legend">
        <span><span class="k" style="background:#E3E0D6"></span>Dovuto</span>
        <span><span class="k" style="background:#1E7A46"></span>Pagato</span>
      </div>
    </div>
    ${ptable}
    ${mtable}
    <p class="hint">Il "dovuto" mensile usa le voci attuali del registro; il "pagato" usa gli importi registrati al momento del timbro, quindi resta corretto anche se in seguito modifichi gli importi.</p>
  `;
  document.getElementById("prev-y").onclick = ()=>{ view.chartY--; render(); };
  document.getElementById("next-y").onclick = ()=>{ view.chartY++; render(); };
}

/* ---------- Gestione ---------- */
function renderGestione(){
  /* entries editor */
  let vhtml = "";
  state.entries.forEach(e=>{
    const chips = state.people.map(p=>{
      const on = (e.peopleIds||[]).includes(p.id);
      return `<button class="chip ${on?'on':''}" data-chip="${e.id}|${p.id}" aria-pressed="${on}">
        <span class="dotc" style="${on?`background:${p.color}`:""}"></span>${esc(p.name)}</button>`;
    }).join("");
    const f = freqOf(e);
    const freqSel = `<label class="optl">Frequenza
      <select data-efreq="${e.id}">${[1,2,3,4,6,12].map(v=>`<option value="${v}" ${v===f?"selected":""}>${FREQ_LABELS[v]}</option>`).join("")}</select></label>`;
    const anchorSel = f>1 ? `<label class="optl">Mese in cui scade
      <select data-eanchor="${e.id}">${MESI.map((n,i)=>`<option value="${i}" ${i===((typeof e.anchorMonth==="number")?e.anchorMonth:0)?"selected":""}>${n}</option>`).join("")}</select></label>` : "";
    const daySel = `<label class="optl">Entro il giorno
      <input type="number" min="1" max="31" step="1" value="${e.dueDay||""}" placeholder="—" data-eday="${e.id}" style="width:80px"></label>`;
    const cashSel = `<label class="optl">Di cui in contanti €
      <input type="number" min="0" max="${e.amount}" step="0.01" value="${e.cashAmount||""}" placeholder="0" data-ecash="${e.id}" style="width:110px"></label>`;
    const contractRow = `<label class="optl" style="flex:1;min-width:200px">Note
      <input type="text" value="${esc(e.note||"")}" placeholder="es. inquilino, IBAN, condizioni…" data-enote="${e.id}"></label>
      <label class="optl">Inizio contratto
      <input type="date" value="${e.contractStart||""}" data-ecstart="${e.id}"></label>
      <label class="optl">Fine contratto
      <input type="date" value="${e.contractEnd||""}" data-ecend="${e.id}"></label>`;

    /* pannello ripartizione */
    const nSel = (e.peopleIds||[]).length;
    const mode = e.split ? e.split.mode : "equal";
    const modeLabel = mode==="percent" ? "percentuali" : mode==="fixed" ? "importi fissi" : "parti uguali";
    const splitOpen = view.expandedSplit===e.id;
    let splitPanel = "";
    if(splitOpen && nSel>0){
      const chk = splitCheck(e);
      let rows = "";
      (e.peopleIds||[]).forEach(pid=>{
        const p = personById(pid);
        if(!p) return;
        const val = e.split ? ((e.split.values&&e.split.values[pid])||0) : null;
        const share = shareOf(e, pid);
        rows += `<div class="splitrow">
          <span class="avatar" style="background:${p.color}">${esc(initials(p.name))}</span>
          <span class="sname">${esc(p.name)}</span>
          ${mode==="equal"
            ? `<span class="sval muted">${eur(share)} <span class="small">(1/${nSel})</span></span>`
            : `<span class="sinput"><input type="number" min="0" step="0.01" value="${val||""}" placeholder="0" data-splitval="${e.id}|${pid}" style="width:100px"> <span class="small muted">${mode==="percent"?"%":"€"}</span></span>
               <span class="sval muted small">= ${eur(share)}</span>`}
        </div>`;
      });
      splitPanel = `<div class="futuri splitpanel">
        <div class="ftitle">Ripartizione — "${esc(e.name)}" · ${eur(e.amount)}</div>
        <div class="srcrow" style="margin-bottom:12px">
          <label class="optl">Modalità
            <select data-splitmode="${e.id}">
              <option value="equal" ${mode==="equal"?"selected":""}>Parti uguali (totale ÷ persone)</option>
              <option value="percent" ${mode==="percent"?"selected":""}>Percentuale del totale</option>
              <option value="fixed" ${mode==="fixed"?"selected":""}>Importo fisso per persona</option>
            </select>
          </label>
        </div>
        ${rows}
        ${mode!=="equal" ? (chk.ok
          ? `<div class="fhint" style="color:var(--verde);font-weight:700">✓ La ripartizione torna: ${mode==="percent"?"100%":eur(e.amount)}.</div>`
          : `<div class="fhint" style="color:var(--rosso);font-weight:700">⚠ Somma attuale ${mode==="percent"?(Math.round(chk.sum*100)/100)+"%":eur(chk.sum)} su ${mode==="percent"?"100%":eur(chk.target)} — le quote non coincidono con il totale della voce.</div>`)
          : `<div class="fhint">Ogni persona selezionata paga la stessa quota. Cambia modalità per usare percentuali o importi fissi.</div>`}
      </div>`;
    }

    vhtml += `
      <div class="gvoce">
        <input type="text" value="${esc(e.name)}" data-ename="${e.id}" aria-label="Nome voce">
        <input type="number" step="0.01" min="0" value="${e.amount}" data-eamount="${e.id}" aria-label="Importo in euro">
        <button class="btn danger sm" data-edel="${e.id}">Elimina</button>
        <div class="opts">${freqSel}${anchorSel}${daySel}${cashSel}</div>
        <div class="opts">${contractRow}</div>
        <div class="chips">${chips || '<span class="muted small">Aggiungi prima delle persone per assegnare la voce.</span>'}
          ${nSel>0?`<button class="chip splitbtn ${e.split?'on':''}" data-splittoggle="${e.id}" aria-expanded="${splitOpen}">⚖ Ripartizione: ${modeLabel} ${splitOpen?"▴":"▾"}</button>`:""}
        </div>
      </div>${splitPanel}`;
  });

  /* people editor */
  let phtml = "";
  state.people.forEach(p=>{
    const n = state.entries.filter(e=>(e.peopleIds||[]).includes(p.id)).length;
    phtml += `
      <div class="plist-item">
        <span class="avatar" style="background:${p.color}">${esc(initials(p.name))}</span>
        <span class="pn">${esc(p.name)} <span class="muted small">· ${n} ${n===1?"voce":"voci"}</span></span>
        <button class="btn danger sm" data-pdel="${p.id}">Rimuovi</button>
      </div>`;
  });

  app.innerHTML = `
    <div class="card">
      <h2 class="sec">Voci di spesa</h2>
      ${vhtml || '<p class="muted">Nessuna voce ancora.</p>'}
      <div class="addrow">
        <input type="text" id="new-ename" placeholder="Nuova voce (es. Affitto, Internet…)" aria-label="Nome nuova voce">
        <input type="number" id="new-eamount" step="0.01" min="0" placeholder="€" aria-label="Importo nuova voce">
        <button class="btn" id="add-entry">Aggiungi</button>
      </div>
      <p class="hint">Tocca i nomi sotto ogni voce per scegliere chi la condivide: l'importo viene diviso in parti uguali. "Di cui in contanti" indica la parte che, al pagamento, finisce nella cassa contanti anziché nella cassa conto. Le modifiche valgono per il mese corrente e i futuri: i mesi passati restano congelati con la loro configurazione.</p>
    </div>

    <div class="card">
      <h2 class="sec">Persone</h2>
      ${phtml || '<p class="muted">Nessuna persona ancora.</p>'}
      <div class="addrow-p">
        <input type="text" id="new-pname" placeholder="Nome (es. Lorenzo)" aria-label="Nome nuova persona">
        <button class="btn" id="add-person">Aggiungi</button>
      </div>
    </div>

    <div class="card">
      <h2 class="sec">Backup dei dati</h2>
      <div class="backup-row">
        <button class="btn ghost" id="export-json">Esporta JSON</button>
        <button class="btn ghost" id="export-csv">Esporta CSV</button>
        <button class="btn ghost" id="import-json">Importa JSON</button>
        <input type="file" id="import-file" accept=".json,application/json" style="display:none">
        <button class="btn danger" id="reset-all">Azzera tutto</button>
      </div>
      <p class="hint">I dati vivono solo in questo browser (localStorage). Il JSON è il backup completo (per ripristinare); il CSV contiene tutti i movimenti — pagamenti, prelievi e spese — pronto da incollare o importare in un foglio di calcolo come Google Sheets.</p>
    </div>
  `;

  /* entry handlers */
  app.querySelectorAll("[data-ename]").forEach(inp=>{
    inp.onchange = ()=>{
      const e = state.entries.find(x=>x.id===inp.dataset.ename);
      if(e && inp.value.trim()){ e.name = inp.value.trim(); save(); }
    };
  });
  app.querySelectorAll("[data-eamount]").forEach(inp=>{
    inp.onchange = ()=>{
      const e = state.entries.find(x=>x.id===inp.dataset.eamount);
      const v = parseFloat(inp.value);
      if(e && !isNaN(v) && v>=0){ e.amount = v; save(); }
    };
  });
  app.querySelectorAll("[data-efreq]").forEach(sel=>{
    sel.onchange = ()=>{
      const e = state.entries.find(x=>x.id===sel.dataset.efreq);
      if(!e) return;
      e.freq = parseInt(sel.value,10) || 1;
      if(e.freq>1 && typeof e.anchorMonth!=="number") e.anchorMonth = now.getMonth();
      save(); render();
    };
  });
  app.querySelectorAll("[data-eanchor]").forEach(sel=>{
    sel.onchange = ()=>{
      const e = state.entries.find(x=>x.id===sel.dataset.eanchor);
      if(e){ e.anchorMonth = parseInt(sel.value,10) || 0; save(); }
    };
  });
  app.querySelectorAll("[data-eday]").forEach(inp=>{
    inp.onchange = ()=>{
      const e = state.entries.find(x=>x.id===inp.dataset.eday);
      if(!e) return;
      const v = parseInt(inp.value,10);
      e.dueDay = (!isNaN(v) && v>=1 && v<=31) ? v : null;
      if(e.dueDay===null) inp.value = "";
      save();
    };
  });
  app.querySelectorAll("[data-ecash]").forEach(inp=>{
    inp.onchange = ()=>{
      const e = state.entries.find(x=>x.id===inp.dataset.ecash);
      if(!e) return;
      let v = parseFloat(inp.value);
      if(isNaN(v) || v<0) v = 0;
      if(v > e.amount){ v = e.amount; notify(`La parte in contanti non può superare l'importo della voce (${eur(e.amount)}): l'ho limitata automaticamente.`); }
      e.cashAmount = v;
      inp.value = v || "";
      save(); render();
    };
  });
  app.querySelectorAll("[data-edel]").forEach(b=>{
    b.onclick = async ()=>{
      const e = state.entries.find(x=>x.id===b.dataset.edel);
      if(!e) return;
      if(await askConfirm(`Eliminare la voce "${e.name}"? Verranno rimossi i suoi pagamenti del mese corrente e futuri; i mesi passati congelati restano invariati.`, "Elimina")){
        state.entries = state.entries.filter(x=>x.id!==e.id);
        Object.keys(state.payments).forEach(k=>{
          if(state.monthSetups[k]) return; /* mese congelato: lo storico non si tocca */
          delete state.payments[k][e.id];
          if(!Object.keys(state.payments[k]).length) delete state.payments[k];
        });
        save(); render();
      }
    };
  });
  app.querySelectorAll("[data-chip]").forEach(b=>{
    b.onclick = ()=>{
      const [eid,pid] = b.dataset.chip.split("|");
      const e = state.entries.find(x=>x.id===eid);
      if(!e) return;
      if(!e.peopleIds) e.peopleIds = [];
      const i = e.peopleIds.indexOf(pid);
      if(i>=0){
        e.peopleIds.splice(i,1);
        if(e.split && e.split.values) delete e.split.values[pid];
      }else{
        e.peopleIds.push(pid);
      }
      save(); render();
    };
  });
  app.querySelectorAll("[data-enote]").forEach(inp=>{
    inp.onchange = ()=>{
      const e = state.entries.find(x=>x.id===inp.dataset.enote);
      if(!e) return;
      const v = inp.value.trim();
      if(v) e.note = v; else delete e.note;
      save();
    };
  });
  app.querySelectorAll("[data-ecstart]").forEach(inp=>{
    inp.onchange = ()=>{
      const e = state.entries.find(x=>x.id===inp.dataset.ecstart);
      if(!e) return;
      if(inp.value) e.contractStart = inp.value; else delete e.contractStart;
      if(e.contractStart && e.contractEnd && e.contractStart > e.contractEnd){
        notify("Attenzione: la data di inizio contratto è successiva alla fine.");
      }
      save();
    };
  });
  app.querySelectorAll("[data-ecend]").forEach(inp=>{
    inp.onchange = ()=>{
      const e = state.entries.find(x=>x.id===inp.dataset.ecend);
      if(!e) return;
      if(inp.value) e.contractEnd = inp.value; else delete e.contractEnd;
      if(e.contractStart && e.contractEnd && e.contractStart > e.contractEnd){
        notify("Attenzione: la data di fine contratto è precedente all'inizio.");
      }
      save();
    };
  });
  app.querySelectorAll("[data-splittoggle]").forEach(b=>{
    b.onclick = ()=>{
      view.expandedSplit = (view.expandedSplit===b.dataset.splittoggle) ? null : b.dataset.splittoggle;
      render();
    };
  });
  app.querySelectorAll("[data-splitmode]").forEach(sel=>{
    sel.onchange = ()=>{
      const e = state.entries.find(x=>x.id===sel.dataset.splitmode);
      if(!e) return;
      if(sel.value==="equal"){
        delete e.split;
      }else{
        const prevMode = e.split ? e.split.mode : null;
        const values = {};
        (e.peopleIds||[]).forEach(pid=>{
          if(e.split && e.split.values && prevMode===sel.value && typeof e.split.values[pid]==="number"){
            values[pid] = e.split.values[pid];
          }else{
            /* prefill con l'equivalente delle parti uguali, arrotondato */
            values[pid] = sel.value==="percent"
              ? Math.round(10000/(e.peopleIds.length))/100
              : Math.round((e.amount/e.peopleIds.length)*100)/100;
          }
        });
        e.split = { mode: sel.value, values };
      }
      save(); render();
    };
  });
  app.querySelectorAll("[data-splitval]").forEach(inp=>{
    inp.onchange = ()=>{
      const [eid,pid] = inp.dataset.splitval.split("|");
      const e = state.entries.find(x=>x.id===eid);
      if(!e || !e.split) return;
      let v = parseFloat(inp.value);
      if(isNaN(v) || v<0) v = 0;
      if(!e.split.values) e.split.values = {};
      e.split.values[pid] = v;
      save(); render();
    };
  });
  document.getElementById("add-entry").onclick = ()=>{
    const name = document.getElementById("new-ename").value.trim();
    const amt = parseFloat(document.getElementById("new-eamount").value);
    if(!name || isNaN(amt) || amt<0){ notify("Inserisci un nome e un importo valido."); return; }
    state.entries.push({id:uid(), name, amount:amt, peopleIds: state.people.map(p=>p.id), freq:1, dueDay:null});
    save(); render();
  };

  /* people handlers */
  document.getElementById("add-person").onclick = ()=>{
    const name = document.getElementById("new-pname").value.trim();
    if(!name){ notify("Inserisci un nome."); return; }
    state.people.push({id:uid(), name, color: PALETTE[state.people.length % PALETTE.length]});
    save(); render();
  };
  app.querySelectorAll("[data-pdel]").forEach(b=>{
    b.onclick = async ()=>{
      const p = personById(b.dataset.pdel);
      if(!p) return;
      if(await askConfirm(`Rimuovere ${p.name}? Verrà tolto/a da tutte le voci e spese condivise.`, "Rimuovi")){
        state.people = state.people.filter(x=>x.id!==p.id);
        state.entries.forEach(e=>{
          if(e.peopleIds) e.peopleIds = e.peopleIds.filter(id=>id!==p.id);
        });
        state.expenses.forEach(x=>{
          if(x.peopleIds) x.peopleIds = x.peopleIds.filter(id=>id!==p.id);
        });
        save(); render();
      }
    };
  });

  /* backup */
  document.getElementById("export-json").onclick = ()=>{
    const blob = new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "affitto-backup-" + new Date().toISOString().slice(0,10) + ".json";
    a.click();
    URL.revokeObjectURL(a.href);
  };
  document.getElementById("export-csv").onclick = ()=>{
    const q = s => '"'+String(s==null?"":s).replace(/"/g,'""')+'"';
    const rows = [["tipo","mese di competenza","data","descrizione","persona","importo","di cui contanti","fonte"]];
    Object.keys(state.payments).sort().forEach(k=>{
      Object.keys(state.payments[k]).forEach(id=>{
        const r = state.payments[k][id];
        const setup = state.monthSetups[k];
        const e = state.entries.find(x=>x.id===id) || (setup && setup.entries.find(x=>x.id===id));
        rows.push(["pagamento affitto", k, r.at||"", e?e.name:"(voce eliminata)", "", (r.amount||0).toFixed(2).replace(".",","), (r.cash||0)>0?(r.cash).toFixed(2).replace(".",","):"", ""]);
      });
    });
    state.withdrawals.forEach(w=>{
      const p = personById(w.personId);
      rows.push(["prelievo", "", w.date||"", w.note||"", p?p.name:"(persona rimossa)", (w.amount||0).toFixed(2).replace(".",","), "", w.fund==="contanti"?"cassa contanti":"cassa conto"]);
    });
    Object.keys(state.expensePayments).sort().forEach(k=>{
      Object.keys(state.expensePayments[k]).forEach(id=>{
        const r = state.expensePayments[k][id];
        const setup = state.monthSetups[k];
        const x = state.expenses.find(e=>e.id===id) || (setup && setup.expenses.find(e=>e.id===id));
        const fonte = r.source==="cassa"?"cassa conto":r.source==="contanti"?"cassa contanti":"altri conti";
        rows.push(["spesa comune", k, r.at||"", x?x.name:"(spesa eliminata)", "", (r.amount||0).toFixed(2).replace(".",","), "", fonte]);
      });
    });
    const csv = rows.map(r=>r.map(q).join(";")).join("\r\n");
    const blob = new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "affitto-movimenti-" + new Date().toISOString().slice(0,10) + ".csv";
    a.click();
    URL.revokeObjectURL(a.href);
  };
  document.getElementById("import-json").onclick = ()=> document.getElementById("import-file").click();
  document.getElementById("import-file").onchange = ev=>{
    const f = ev.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = async ()=>{
      try{
        const s = JSON.parse(r.result);
        if(!s || typeof s!=="object" || !Array.isArray(s.people)) throw new Error("bad");
        if(await askConfirm("Sostituire tutti i dati attuali con il backup importato?", "Importa")){
          state = migrate(s); autoFreezePastMonths(); save(); render();
        }
      }catch(e){ notify("File non valido: deve essere un backup JSON esportato da questa app."); }
      ev.target.value = "";
    };
    r.readAsText(f);
  };
  document.getElementById("reset-all").onclick = async ()=>{
    if(await askConfirm("Azzerare TUTTI i dati (persone, voci, pagamenti, prelievi, spese, saldi iniziali e configurazioni congelate)? L'operazione non è reversibile.", "Azzera tutto")){
      state = migrate({});
      save(); render();
    }
  };
}

autoFreezePastMonths();
render();
</script>

  getRedirectResult(auth)

  // Current authentication state
  onAuthStateChanged(auth, (user) => {

  });

  document.body.insertAdjacentHTML(

  const casaId = "principale";


  // Local -> Firebase
  AFFITTO.onChange(async (state) => {

      console.log("Non autenticato: non salvo su Firebase");
      return;
    }

    await setDoc(
      doc(db, "case", casaId),
      state
    );

  // Firebase -> Local
  onSnapshot(
    doc(db, "case", casaId),
    (snap) => {

      const remote = snap.data();

      if (
        remote &&
        remote.updatedAt !== AFFITTO.getState().updatedAt
      ) {
        AFFITTO.applyRemote(remote);
      }

    }
  );


  console.log("Sincronizzazione Firebase attiva!");
